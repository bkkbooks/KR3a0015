front:
  text: 孫子集註卷之一
  hash: sha256:d0c87b1ba4c535f7df52ed11549bf7944955b7a8bc2fbd9bca130703dc84b99b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0015_SBCK_001-1a}
body:
  text: 計篇曹操曰計者選將量敵度地料子逺近險易計於廟堂也李筌曰計者兵之上也太一遁甲先以計神加德宮以斷主客成敗故孫子論兵亦以計爲篇首杜牧曰計筭也曰計筭何事曰下之五事所謂道天地將法也於廟堂之上先以彼我之五事計筭優劣然後定勝負勝負旣定然後興師動衆用兵之道莫先此五事故著爲篇首耳王晳曰計者謂計主將天地法令兵衆士卒賞罰也張預曰管子曰計先定於内而後兵出境故用兵之道以計爲首也或曰兵貴臨敵制宜曹公謂計於廟堂者何也曰將之賢愚敵之强弱地之逺近兵之衆寡安得不先計之及乎兩軍相臨變動相應則在於將之所裁非可以隃度也孫子曰兵者國之大事杜牧曰傳曰國之大事在祀與戎張預曰國之安危在兵故講武練兵實先務也死生之地存亡之道不可不察也李筌曰兵者㐫器死生存亡繫於此矣是以重之恐人輕行者也杜牧曰國之存亡人之死生皆由於兵故須審察也賈林曰地猶所也亦謂陳師振旅戰陳之地得其利則生失其便則死故曰死生之地道者權機立勝之道得之則存失之則亡故曰不可不察也書曰有存道者輔而固之有亡道者推而亡之梅堯臣曰地有死生之勢戰有存亡之道王晳曰兵舉則死生存亡繋之張預曰民之死生兆於此則國之存亡見於彼然死生曰地存亡曰道者以死生在勝負之地而存亡繋得失之道也得不重慎審察乎故經之以五事校之以計而索其情曹操曰謂下五事七計求彼我之情也李筌曰謂下五事也校量也量計逺近而求物情以應敵杜牧曰經者經度也五者卽下所謂五事也校者校量也計者卽篇首計筭也索者搜索也情者彼我之情也此言先須經度五事之優劣次復校量計筭之得失然後始可搜索彼我勝負之情狀賈林曰校量彼我之計謀搜索兩軍之情實則長短可知勝負易見梅堯臣曰經紀五事校定計利王晳曰經常也又經緯也計者謂下七計索盡也兵之大經不出道天地將法耳就而校之以七計然後能盡彼已勝負之情狀也張預曰經經緯也上先經緯五事之次序下乃用五事以校計彼我之優劣探索勝負之情狀一曰道張預曰恩信使民二曰天張預曰上順天時三曰地張預曰下知地利四曰將張預曰委任賢能五曰法杜牧曰此之謂五事也王晳曰此經之五事也夫用兵之道人和爲本天時與地利則其助也三者具然後議舉兵兵舉必須將能將能然後法修孫子所次此之謂矣張預曰節制嚴明夫將與法在五事之末者凡舉兵伐罪廟堂之上先察恩信之厚薄後度天時之逆順次審地形之險易三者巳熟然後命將征之兵旣出境則法令一從於將此其次序也道者令民與上同意也張預曰以恩信道義撫衆則三軍一心樂爲其用易曰恱以犯難民忘其死故可以與之死可以與之生而不畏危曹操曰謂道之以敎令危者危疑也李筌曰危亡也以道理衆人自化之得其同用何亡之有杜牧曰道者仁義也李斯問兵於荀卿答曰彼仁義者所以修政者也政修則民親其上樂其君輕爲之死復對趙孝成王論兵曰百將一心三軍同力臣之於君也下之於上也若子之事父弟之事兄若手臂之捍頭目而覆胷臆也如此始可令與上下同意死生同致不畏懼於危疑也陳皥註同杜牧孟氏曰一作人不疑謂始終無二志也一作人不危道謂道之以政令齊之以禮敎故能化服士民與上下同一也故用兵之妙以權術爲道大道廢而有法法廢而有權權廢而有勢勢廢而有術術廢而有數大道淪替人情訛僞非以權數而取之則不得其欲也故其權術之道使民上下同進趨共愛憎一利害故人心歸於德得人之力無私之至也故百萬之衆其心如一可與俱同死力動而不至危亡也臣之於君下之於上若子之事父弟之事兄若手臂之捍頭目而覆胷臆也如此始可與上同意死生同致不畏懼於危疑賈林曰將能以道爲心與人同利共患則士卒服自然心與上者同也使士卒懐我如父母視敵如仇讎者非道不能也黄石公云得道者昌失道者亡杜佑曰謂導之以政令齊之以禮敎也危者疑也上有仁施下能致命也故與處存亡之難不畏傾危之敗若晉陽之圍沈竈産蛙人無叛疑心矣梅堯臣曰危戾也主有道則政敎行人心同則危戾去故主安與安主危與危王晳曰道謂主有道能得民心也夫得民之心者所以得死力也得死力者所以濟患難也易曰恱以犯難民忘其死如是則安畏危難之事乎張預曰危疑也士卒感恩死生存亡與上同之決然無所疑懼天者隂陽寒暑時制也曹操曰順天行誅因隂陽四時之制故司馬法曰冬夏不興師所以兼愛民也李筌曰應天順人因時制敵杜牧曰隂陽者五行刑德向背之類是也今五緯行止最可據驗巫咸甘氏石氏唐䝉史墨梓慎禆竈之徒皆有著述咸稱祕奥察其指歸皆本人事凖星經曰歲星所在之分不可攻攻之反受其殃也左傳昭三十二年夏吳伐越始用師於越史墨曰不及四十年越其有吳乎越得歲而吳伐之必受其㐫註曰存亡之數不過三紀歲月三周三十六歲故曰不及四十年也此年歳在星紀星紀吳分也歲星所在其國有福吳先用兵故反受其殃哀二十二年越㓕吳至此三十八歳也李淳風曰天下誅秦歲星聚於東井秦政暴虐失歲星仁和之理違歲星㳟肅之道拒諌信讒是故胡亥終於滅亡復曰歲星清明潤澤所在之國分大吉君令合於時則歲星光喜年豐人安君尚暴虐令人不便則歲星色芒角而怒則兵起由此言之歲星所在或有福德或有災祥豈不皆本於人事乎夫吳越之君德均勢敵闔閭興師志於吞滅非爲拯民故歲星福越而禍吳秦之殘酷天下誅之上合天意故歳星禍秦而祚漢熒惑罰星也宋景公出一善言熒惑退移三舎而延二十七年以此推之歲爲善星不福無道火爲罰星不罰有德舉此二者其他可知況所臨之分隨其政化之善惡各變其本色芒角大小隨爲禍福各隨時而占之淳風曰夫形器著於下精象係於上近取之身耳目爲肝腎之用鼻口實心腹所資彼此影響豈不然歟易曰在天成象在地成形變化見矣蓋本於人事而已矣刑德向背之說尤不足信夫刑德天官之陳背水陳者爲絶紀向山坂陳者爲廢軍武王伐紂背清水向山坂而陳以二萬二千五百人撃紂之億萬而滅之今可目睹者國家自元和已至今三十年間凡四伐趙㓂昭義軍加以數道之衆常號十萬圍之臨城縣攻其南不拔攻其北不拔攻其東不拔攻其西不拔其四度圍之通有十歲十歲之内東西南北豈有刑德向背王相吉辰哉其不拔者豈不曰城堅池深糧多人一哉復以往事驗之秦累世戰勝竟滅六國豈天道二百年間常在乾方福德常居鶉首豈不曰穆公已還卑身趨士務耕戰明法令而致之乎故梁惠王問尉繚子曰黄帝有刑德可以百戰百勝其有之乎尉繚子曰不然黄帝所謂刑德者刑以伐之德以守之非世之所謂刑德也夫舉賢用能者不時日而利明法審令者不卜筮而吉貴功養勞者不禱祠而福周武王伐紂師次于汜水共頭山風雨疾雷鼓旗毀折王之驂乘惶懼欲死太公曰夫用兵者順天道未必吉逆之未必㐫若失人事則三軍敗亡且天道鬼神視之不見聽之不聞故智者不法愚者拘之若乃好賢而任能舉事而得時此則不看時日而事利不假卜筮而事吉不待禱祠而福從遂命驅之前進周公曰今時逆太歲龜灼言㐫卜筮不吉星㐫爲災請還師太公怒曰今紂剖比干囚箕子以飛廉爲政伐之有何不可枯草朽骨安可知乎乃焚龜折蓍率衆先渉武王從之遂滅紂宋高祖圍慕容超於廣固將攻城諸將咸諫曰今往亡之日兵家所忌高祖曰我往彼亡吉孰大焉乃命悉登遂克廣固後魏太祖武帝討後燕慕容麟甲子晦日進軍太史令鼂崇奏曰昔紂以甲子日亡帝曰周武豈不以甲子日勝乎崇無以對遂戰破之後魏太武帝征夏赫連昌於統萬城師次城下昌鼓噪而前㑹有風雨從賊後來太史進曰天不助人將士飢渴願且避之崔浩曰千里制勝一日豈得變易風道在人豈有常也帝從之昌軍大敗或曰如此者隂陽向背定不足信孫子叙之何也答曰夫暴君昬主或爲一珤一馬則必殘人逞志非以天道鬼神誰能制止故孫子叙之蓋有深旨寒暑時氣節制其行止也周瑜爲孫權數曹公四敗一曰今盛寒馬無藁草驅中國士衆逺渉江湖不習水土必生疾病此用兵之忌也寒暑同歸於天時故聮以叙之也孟氏曰兵者法天運也隂陽者剛柔盈縮也用隂則沉虚固靜用陽則輕捷猛厲後則用隂先則用陽隂無蔽也陽無察也隂陽之象無定形故兵法天天有寒暑兵有生殺天則應殺而制物兵則應機而制形故曰天也賈林曰讀時制爲時氣謂從其善時占其氣候之利也杜佑曰謂順天行誅因隂陽四時剛柔之制梅堯臣曰兵必參天道順氣候以時制之所謂制也司馬法曰冬夏不興師所以兼愛民也王晳曰謂隂陽總天道五行四時風雲氣象也善消息之以助軍勝然非異人特授其訣則末由也若黄石授書張良乃太公兵法是也意者豈天機神宻非常人所得知耶其諸十數家紛紜抑未足以取審矣寒暑若吳起云疾風大寒盛夏炎熱之類時制因時利害而制宜也范蠡云天時不作弗爲人客是也張預曰夫隂陽者非孤虚向背之謂也蓋兵自有隂陽耳范蠡曰後則用隂先則用陽盡敵陽節盈吾隂節而奪之又云設右爲牝益左爲牝早晏以順天道李衞公解曰左右者人之隂陽早晏者天之隂陽竒正者天人相變之隂陽此皆言兵自有隂陽剛柔之用非天官日時之隂陽也今觀尉繚子天官之篇則義最明矣太白隂經亦有天無隂陽之篇皆著爲卷首欲以決世人之惑也太公曰聖人欲止後世之亂故作爲譎書以寄勝於天道無益於兵也是亦然矣唐太宗亦曰㐫器無甚於兵行兵苟便於人事豈以避忌爲疑也寒暑者謂冬夏興師也漢征匈奴士多墮指馬援征蠻卒多疫死皆冬夏興師故也時制者謂順天時而制征討也太白隂經言天時者乃水旱蝗雹荒亂之天時非孤虚向背之天時也地者逺近險易廣狹死生也曹操曰言以九地形勢不同因時制利也論在九地篇中李筌曰得形勢之地有死生之勢梅堯臣曰知形勢之利害張預曰凡用兵貴先知地形知逺近則能爲迃直之計知險易則能審歩騎之利知廣狹則能度衆寡之用知死生則能識戰散之勢也將者智信仁勇嚴也曹操曰將宜五德備也李筌曰此五者爲將之德故師有丈人之稱也杜牧曰先王之道以仁爲首兵家者流用智爲先蓋智者能機權識變通也信者使人不惑於刑賞也仁者愛人憫物知勤勞也勇者決勝乘勢不逡巡也嚴者以威刑肅三軍也椘申包胥使於越越王勾踐將伐吳問戰焉夫戰智爲始仁次之勇次之不智則不能知民之極無以詮度天下之衆寡不仁則不能與三軍共飢勞之殃不勇則不能斷疑以發大計也賈林曰專任智則賊偏施仁則懦固守信則愚恃勇力則暴令過嚴則殘五者兼備各適其用則可爲將帥梅堯臣曰智能發謀信能賞罰仁能附衆勇能果斷嚴能立威王晳曰智者先見而不惑能謀慮通權變也信者號令一也仁者惠撫惻隱得人心也勇者徇義不懼能果毅也嚴者以威嚴肅衆心也五者相須闕一不可故曹公曰將宜五德備也何氏曰非智不可以料敵應機非信不可以訓人率下非仁不可以附衆撫士非勇不可以決謀合戰非嚴不可以服强齊衆全此五才將之體也張預曰智不可亂信不可欺仁不可暴勇不可懼嚴不可犯五德皆備然後可以爲大將法者曲制官道主用也曹操曰部曲旛幟金鼓之制也官者百官之分也道者糧路也主者主軍費用也李筌曰曲部曲也制節度也官爵賞也道路也主掌也用者軍資用也皆師之常法而將所治也杜牧曰曲者部曲隊伍有分畫也制者金鼓旌旗有節制也官者偏禆校列各有官司也道者營陳開闔各有道徑也主者管庫厮養職守主張其事也用者車馬器械三軍須用之物也荀卿曰械用有數夫兵者以食爲本須先計糧道然後興師梅堯臣曰曲制部曲隊伍分畫必有制也官道禆校首長統率必有道也主用主軍之資糧百物必有用度也王晳曰曲者卒伍之屬制者節制其行列進退也官者羣吏偏禆也道者軍行及所舎也主者主守其事用者凡軍之用謂輜重糧積之屬張預曰曲部曲也制節制也官謂分偏禆之任道謂利糧餉之路主者職掌軍資之人用者計度費用之物六者用兵之要宜處置有其法凡此五者將莫不聞知之者勝不知者不勝張預曰巳上五事人人同聞但深暁變極之理則勝不然則敗故校之以計而索其情曹操曰同聞五者將知其變極卽勝也索其情者勝負之情杜牧曰謂上五事將欲聞知校量計筭彼我之優劣然後搜索其情狀乃能必勝不爾則敗賈林曰書云非知之艱行之惟難王晳曰當盡知也言雖周知五事待七計以盡其情也張預曰上巳陳五事自此而下方考校彼我之得失探索勝負之情狀也曰主孰有道曹操曰道德智能李筌曰孰實也有道之主必有智能之將范增辭楚陳平歸漢卽其義也杜牧曰孰誰也言我與敵人之主誰能逺倿親賢任人不疑也杜佑曰主君也道道德也必先考校兩國之君誰知誰否也若荀息料虞公貪而好寳宫之竒懦而不能强諌是也梅堯臣曰誰能得人心也王晳曰若韓信言項王匹夫之勇婦人之仁名雖爲霸實失天下心謂漢王入武關秋毫無所害除秦苛法秦民亡不欲大王王秦者是也何氏曰書曰撫我則后虐我則讎撫虐之政孰有之也張預曰先校二國之君誰有恩信之道卽上所謂令民與上同意者之道也若淮隂料項王仁勇過高祖而不賞有功爲婦人之仁亦是也將孰有能杜牧曰將孰有能者上所謂智信仁勇嚴若漢高祖料魏將柏直不能當韓信之類也天地孰得曹操李筌並曰天時地利杜牧曰天者上所謂隂陽寒暑時制也地者上所謂逺近險易廣狹死生也杜佑曰視兩軍所據知誰得天時地利梅堯臣曰稽合天時審察地利王晳同杜牧註張預曰觀兩軍所舉誰得天時地利若魏武帝盛冬伐吳慕容超不據大峴則失天時地利者也法令孰行曹操曰設而不犯犯而必誅杜牧曰縣法設禁貴賤如一魏絳戮僕曹公斷髮是也杜佑曰發號出令校孰下不敢犯梅堯臣曰齊衆以法一衆以令王晳曰孰能法明令便人聽而從張預曰魏絳戮揚千穰苴斬荘賈吕蒙誅鄕人卧龍刑馬謖玆所謂設而不犯犯而必誅誰爲如此兵衆孰强杜牧曰上下和同勇於戰爲强卒衆車多爲强梅堯臣曰内和外附王晳曰强弱足以相刑而知張預曰車堅馬良士勇兵利聞鼓而喜聞金而怒誰者爲然士卒孰練杜牧曰辨旌旗審金鼓明開合知進退閑馳逐便弓矢習擊刺也杜佑曰知誰兵器强利士卒簡練者故王子曰士不素習當陳惶惑將不素習臨陳闇變梅堯臣曰車騎閑習孰國精粗王晳曰孰訓之精何氏曰勇怯强弱豈能一槩張預曰離合聚散之法坐作進退之令誰素閑習賞罰孰明杜牧曰賞不僣刑不濫杜佑曰賞善罰惡知誰分明者故王子曰賞無度則費而無恩罰無度則戮而無威梅尭臣曰賞有功罰有罪王晳曰孰能賞必當功罰必稱情張預曰當賞者雖仇怨必録當罰者雖父子不舍又司馬法曰賞不逾時罰不遷列於誰爲眀吾以此知勝負矣曹操曰以七事計之知勝負矣賈林曰以上七事量校彼我之政則勝敗可見梅堯臣曰能索其情則知勝負張預曰七事俱優則未戰而先勝七事俱劣則未戰而先敗故勝負可預知也將聽吾計用之必勝留之將不聽吾計用之必敗去之曹操曰不能定計則退而去也杜牧曰若彼自備護不從我計形勢均等無以相加用戰必敗引而去之故春秋傳曰允當則歸也陳皥曰孫武以書千闔閭曰聽用吾計䇿必能勝敵我當留之不去不聽吾計䇿必當負敗我去之不留以此感動闔閭庻必見用故闔閭曰子之十三篇寡人盡觀之矣其時闔閭行軍用師多自爲將故不言主而言將也孟氏曰將禆將也聽吾計畫而勝則留之違吾計畫而敗則除去之梅堯臣曰武以十三篇千吳王闔閭故首篇以此辭動之謂王將聽吾計而用戰必勝我當留此也王將不聽我計而用戰必敗我當去此也王晳曰將行也用謂用兵耳言行聽吾此計用兵則必勝我當留行不聽吾此計用兵則必敗我當去也張預曰將辭也孫子謂今將聽吾所陳之計而用兵則必勝我乃留此矣將不聽吾所陳之計而用兵則必敗我乃去之他國矣以此辭激吳王而求用計利以聽乃爲之勢以佐其外曹操曰常法之外也李筌曰計利旣定乃乘形勢之勢也佐其外者常法之外也杜牧曰計筭利害是軍事根本利害巳見聽用然後於常法之外更求兵勢以助佐其事也賈林曰計其利聽其謀得敵之情我乃設竒譎之勢以動之外者或傍攻或後躡以佐正陳梅堯臣曰定計於内爲勢於外以助成勝王晳曰吾計之利巳聽復當知應變以佐其外張預曰孫子又謂吾所計之利若巳聽從則我當復爲兵勢以佐助其事於外蓋兵之常法卽可明言於人兵之利勢須因敵而爲勢者因利而制權也曹操曰制由權也權因事制也李筌曰謀因事勢杜牧曰自此便言常法之外勢夫勢者不可先見或因敵之害見我之利或因敵之利見我之害然後始可制機權而取勝也梅堯臣曰因利行權以制之王晳曰勢者乘其變者也張預曰所謂勢者須因事之利制爲權謀以勝敵耳故不能先言也自此而後略言權變兵者詭道也曹操曰兵無常形以詭詐爲道李筌曰軍不厭詐梅尭臣曰非譎不可以行權非權不可以制敵王晳曰詭者所以求勝敵御衆必以信也張預曰用兵雖本於仁義然其取勝必在詭詐故曵柴揚塵欒枝之譎也萬弩齊發孫臏之竒也千牛俱奔田單之權也囊沙壅水淮隂之詐也此皆用詭道而制勝也故能而示之不能張預曰實强而示之弱實勇而示之怯李牧敗匈奴孫臏斬龎㳙之類也用而示之不用李筌曰言已實用師外示之怯也漢將陳豨反連兵匈奴高祖遣使十輩視之皆言可擊復遣婁敬報曰匈奴不可擊上問其故對曰夫兩國相制宜矜誇其長今臣往徒見羸老此必能而示之不能臣以爲不可擊也高祖怒曰齊虜以口舌得官今妄沮吾衆械婁敬于廣武以三十萬衆至白登高祖爲匈奴所圍七日乏食此師外示之以怯之義也杜牧曰此乃詭詐蔵形夫形也者不可使見於敵敵人見形必有應傳曰鷙鳥將擊必蔵其形如匈奴示羸老於漢使之義也杜佑曰言巳實能用外示之以不能不用使敵不我備也若孫臏減竈而制龎㳙王晳曰强示弱勇示怯治示亂實示虚智示愚衆示寡進示退速示遲取示捨彼示此何氏曰能而示之不能者如單于羸師誘高祖圍于平城是也用而示之不用者如李牧按兵於雲中大敗匈奴是也張預曰欲戰而示之退欲速而示之緩班超擊莎車趙奢破秦軍之類也近而示之逺逺而示之近李筌曰令敵失備也漢將韓信虜魏王豹𥘉陳舟欲渡臨晉乃濳師浮木甖從夏陽襲安邑而魏失備也耿弇之征張歩亦先攻臨淄皆示逺勢也杜牧曰欲近襲敵必示以逺去之形欲逺襲敵必示以近進之形韓信盛兵臨晉而渡於夏陽此乃示以近形而逺襲敵也後漢末曹公袁紹相持官渡紹遣將郭圖淳于瓊顔良等攻東郡太守劉延於白馬紹引兵至黎陽將渡河曹公北救延津荀攸曰今兵少不敵分兵勢乃可公致兵延津將欲渡兵向其後紹必西應之然後輕兵襲白馬掩其不備顔良可擒也公從之紹聞兵渡卽留分兵西應之公乃引軍行趨白馬未至十餘里良大驚來戰使張遼關羽前進擊破斬顔良解白馬圍此乃示以逺形而近襲敵也賈林曰去就在我敵何由知杜佑曰欲近而設其逺也欲逺而設其近也誑耀敵軍示之以逺本從其近若韓信之襲安邑梅堯臣曰使其不能賾王晳同上註何氏曰逺而示之近者韓信陳舟臨晉而渡夏陽是也近而示之逺者晉侯伐虢假道于虞是也張預曰欲近襲之反示以逺吳與越夾水相矩越爲左右句卒相去各五里夜爭鳴鼓而進吳人分以禦之越乃濳渉當吳中軍而襲之吳大敗是也欲逺攻之反示以近韓信陳兵臨晉而渡於夏陽是也利而誘之杜牧曰趙將李牧大縱畜牧人衆滿野匈奴小人徉北不勝以數千人委之單于聞之大喜率衆大至牧多爲竒陳左右夾擊大破殺匈奴十餘萬騎也賈林曰以利動之動而有形我所以因形制勝也梅堯臣曰彼貪利則以貨誘之何氏曰利而誘之者如赤眉委輜重而餌鄧禹是也張預曰示以小利誘而克之若楚人伐絞莫敖曰絞小而輕請無扞采樵者以誘之於是絞人獲楚三十人明日絞人爭出驅楚役徒於山中楚人設伏兵於山下而大敗之是也亂而取之李筌曰敵貪利必亂也秦王姚興征秃髮傉檀悉驅部内牛羊散放於野縱秦人虜掠秦人得利旣無行列傉檀隂分十將掩而擊之大敗秦人斬首七千餘級亂而取之之義也杜牧曰敵有昬亂可以乘而取之傳曰兼弱攻昧取亂侮亡武之善經也賈林曰我令姦智亂之候亂而取之也梅堯臣曰彼亂則乘而取之王晳曰亂謂無節制取言易也張預曰詐爲紛亂誘而取之若吳越相攻吳以罪人三千示不整以誘越罪人或奔或止越人爭之爲吳所敗是也言敵亂而後取者非也春秋之法凡書取者言易也魯師取邿是也實而備之曹操曰敵治實須備之也李筌曰備敵之實蜀將關羽欲圍魏之樊城懼吳將吕蒙襲其後乃多留備兵守荆州蒙隂知其旨遂詐之以疾羽乃撤去備兵遂爲蒙所取而荆州沒吳則其義也杜牧曰對壘相持不論虚實常須爲備此言居常無事鄰封接境敵若脩政治實上下相愛賞罰明信士卒精練卽須備之不待交兵然後爲備也陳皥曰敵若不動完實我當謹備亦自實以備敵也梅堯臣曰彼實則不可不備王晳曰彼將有以擊吾之不備也何氏曰彼敵但見其實而未見其虚之形則當蓄力而備之也張預曰經曰角之而知有餘不足之處有餘則實也不足則虚也言敵人兵勢旣實則我當爲不可勝之計以待之勿輕舉也李靖軍鏡曰觀其虚則進見其實則止强而避之曹操曰避其所長也李筌曰量力也楚子伐隨隨之臣季梁曰楚人上左君必左無與王遇且攻其右右無良焉必敗偏敗衆乃攜矣少師曰不當王非敵也不從隨師敗績隨侯逸攻强之敗也杜牧曰逃避所長言敵人乘兵强氣銳則當須且囬避之待其衰懈候其間隙而擊之晉未嶺南賊盧循徐道覆乘虚襲建鄴劉裕禦之曰賊若新亭直上且當避之囬泊蔡洲乃成擒耳徐道覆欲焚舟直上循以爲不可乃泊於蔡洲竟以敗滅賈林曰以弱制强理須待變杜佑曰彼府庫充實士卒銳盛則當退避以伺其虚懈觀變而應之梅堯臣曰彼强則我當避其銳王晳曰敵兵精銳我勢寡弱則須退避張預曰經曰無邀正正之旗無擊堂堂之陳言敵人行陳修整節制嚴明則我當避之不可輕肆也若秦晉相攻交綏而退蓋各防其失敗也怒而撓之曹操曰待其衰懈也李筌曰將之多怒者權必易亂性不堅也漢相陳平謀撓楚權以太牢具進楚使驚曰是亞父使邪乃項王使邪此怒撓之者也杜牧曰大將剛戾者可激之令怒則逞志快意志氣撓亂不顧本謀也孟氏曰敵人盛怒當屈擾之梅堯臣曰彼偏急易怒則撓之使憤激輕戰王晳曰敵持重則激怒以撓之何氏曰怒而撓之者漢兵擊曹咎於汜水是也張預曰彼性剛忿則辱之令怒志氣撓惑則不謀而輕進若晉人執宛春以怒楚是也尉繚子曰寛不可激而怒言性寛者則不可激怒而致之也卑而驕之李筌曰幣重而言甘其志不小後趙石勒稱臣於王浚左右欲擊之浚曰石公來欲奉我耳敢言擊者斬設饗禮以待之勒乃驅牛羊數萬頭聲言上禮實以塡諸街巷使浚兵不得發乃入薊城擒浚於㕔斬之而幷燕卑而驕之則其義也杜牧曰秦末匈奴冐頓初立東胡强使使謂冐頓曰欲得頭曼時千里馬冐頓以問羣臣羣臣皆曰千里馬國之寳勿與冐頓曰奈何與人鄰國愛一馬乎遂與之居頃之東胡使使來曰願得單于一閼氏冐頓問羣臣皆怒曰東胡無道乃求閼氏請擊之冐頓曰與人鄰國愛一女子乎與之居頃之東胡復曰匈奴有棄地千里吾欲有之冐頓問羣臣羣臣皆曰與之亦可不與亦可冐頓大怒曰地者國之本也本何可與諸言與者皆斬之冐頓上馬令國中有後者斬東襲東胡東胡輕冐頓不爲之備冐頓擊滅之冐頓遂西擊月氏南幷樓煩白羊河南北侵燕代悉復收秦所使蒙恬所奪匈奴地也陳皥曰所欲必無所顧恡子女以惑其心玉帛以驕其志范蠡鄭武之謀也杜佑曰彼其舉國興師怒而欲進則當外示屈撓以高其志俟惰歸要而擊之故王子曰善用法者如狸之與䑕力之與智示之猶卑靜而下之梅堯臣曰示以卑弱以驕其心王晳曰示卑弱以驕之彼不虞我而擊其間張預曰或卑辭厚賂或羸師佯北皆所以令其驕怠吳子伐齊越子率衆而朝王及列士皆有賂吳人皆喜惟子胥懼曰是豢吳也後果爲越所滅楚伐庸七遇皆比庸人曰椘不足與戰矣遂不設備椘子乃爲二隊以伐之遂滅庸皆其義也佚而勞之一本作引而勞之曹操曰以利勞之李筌曰敵佚而我勞之者善功也吳伐椘公子光問計於伍子胥子胥曰可爲三師以肄焉我一師至彼必盡衆而出彼出我歸亟肄以疲之多方以誤之然後三師以繼之必大克從之椘於是乎始病吳矣杜牧曰吳公子光問伐椘於伍員員曰可爲三軍以肄焉我一師至彼必盡出彼出則歸亟肄以疲之多方以誤之然後三師以繼之必大克從之於是子重一歲七奔命於是乎始病吳終入郢後漢末曹公旣破劉備備奔袁紹引兵欲與曹公戰别駕田豐曰操善用兵未可輕舉不如以乆持之將軍據山河之固有四州之地外結英豪内修農戰然後㨂其精銳分爲竒兵乘虚迭出以擾河南救右則擊其左救左則擊其右使敵疲於奔命人不安業我未勞而彼巳困矣不及三年可坐克也今釋廟勝之荣而決成敗於一戰悔無及也紹不從故敗梅堯臣曰以我之佚待彼之勞王晳曰多竒兵也彼出則歸彼歸則出救左則右救右則左所以罷勞之也何氏曰孫子有治力之法以佚而待勞故論敵佚我宜多方以勞弊之然後可以制勝張預曰我則力全彼則道敝若晉椘爭鄭乆而不決晉知武子乃分四軍爲三部晉各一動而椘三來於是三駕而椘不能與之爭又申公巫臣教吳伐椘於是子重一歲七奔命是也親而離之曹操曰以間離之李筌曰破其行約間其君臣而後攻也昔秦伐趙秦相應侯間於趙王曰我惟懼趙用括耳廉頗易與也趙王然之乃用括代頗爲秦所坑卒四十萬於長平則其義也杜牧曰言敵若上下相親則當以厚利㗖而離間之陳平言於漢王曰今項王骨鯁之臣不過亞父鍾離昧龍且周殷之屬不過數人大王誠能捐數萬斤金間其君臣彼必内相誅漢因舉兵而攻之滅椘必矣漢王然之出黃金四萬斤與平使之反間項王果疑亞父不急擊下滎陽漢王遁去陳皥曰彼恡爵祿此必捐之彼嗇財貨此必輕之彼好殺罰此必緩之因其上下相猜得行離間之說由余所以歸秦英布所以佐漢也杜佑曰以利誘之使五間並入辯士馳說親彼君臣分離其形勢若秦遣反間欺誑趙君使廢廉頗而任趙奢之子卒有長平之敗梅堯臣同杜牧註王晳曰敵相親當以計謀離間之張預曰或間其君臣或間其交援使相離貳然後圖之應侯間趙而退廉頗陳平間椘而逐范增是君臣相離也秦晉相合以伐鄭燭之武夜出說秦伯曰今得鄭則歸於晉無益於秦也不如捨鄭以爲東道主秦伯悟而退師是交援相離也攻其無備出其不意曹操曰擊其懈怠出其空虚李筌曰擊懈怠襲空虚杜牧曰擊其空虚襲其懈怠孟氏曰擊其空虚襲其懈怠使敵不知所以備也故曰兵者無形爲妙太公曰動莫神於不意謀莫善於不識梅堯臣王晳二註同上何氏曰攻其無備者魏太祖征烏栢郭嘉曰胡恃其逺必不設備因其無備卒然擊之可破滅也太祖行至易水嘉曰兵貴神速今千里襲人輜重多難以趨利不如輕兵兼道以出掩其不意乃宻出盧龍塞直指單于庭合戰大破之唐李靖陳十荣以圖蕭銑總管三軍之任一以委靖八月集兵夔州銑以時屬秋潦江水泛漲三峽路危必謂靖不能進遂不設備九月靖率兵而進曰兵貴神速機不可失今兵始集銑尚未知乘水漲之勢倐忽至城下所謂疾雷不及掩耳縱使知我倉卒無以應敵此必成擒也進兵至夷陵銑始懼召兵江南果不能至勒兵圍城銑遂降出其不意者魏末遣將鍾㑹鄧艾伐蜀蜀將姜維守劒閣鍾㑹攻維未克艾上言請從隂平由邪徑出劒閣西入成都竒兵衝其腹心劒閣之軍必還赴涪則㑹方軌而進劒閣之軍不還則應涪之兵寡矣軍志云攻其無備出其不意今掩其空虚破之必矣冬十月艾自隂平行無人之地七百餘里鑿山通道造作橋閣山高谷深至爲艱險又糧運將匱瀕於危殆艾以氊自裏推轉而下將士皆攀木緣崖魚貫而進先登至江油蜀守將馬邈降諸葛瞻自涪還線行列陳相拒大敗之斬瞻及尚書張遵等進軍至成都蜀主劉禪降又齊神武爲東魏將率兵伐西魏屯軍蒲坂造三道浮橋渡河又遣其將竇泰趣潼關高敖曹圍洛州西魏將周文帝出軍廣陽召諸將謂曰賊今掎吾三面又造橋於河示欲必渡欲綴吾軍使竇泰得西入耳乆與相持其計得行非良荣也且高歡用兵常以泰爲先驅其下多銳卒屢勝而驕今出其不意襲之必克克泰則歡不戰而自走矣諸將咸曰賊在近捨而逺襲事若蹉跌悔無可及周文曰歡前再襲潼關吾軍不過霸上今者大來兵未出郊賊顧謂吾但自守耳無逺闘意又狃於得志有輕我心乗此擊之何往不克賊雖造橋未能征渡比五日中吾取竇泰必矣公等勿疑周文遂率騎六千還長安聲言欲往隴右辛亥濳出軍癸丑晨至潼關竇泰卒聞軍至惶懼依山爲陳未及成列周文擊破之斬泰傳首長安高敖曹適䧟洛州聞泰没燒輜重棄城而走張預曰攻無備者謂懈怠之處敵之所不虞者則擊之若燕人畏鄭三軍而不虞制人爲制人所敗是也出不意者謂虚空之地敵不以爲慮者則襲之若鄧艾伐蜀行無人之地七百餘里是也此兵家之勝不可先傳也曹操曰傳猶洩也兵無常勢水無常形臨敵變化不可先傳也故料敵在心察機在目也李筌曰無備不意攻之必勝此兵之要祕而不傳也杜牧曰傳言也此言上之所陳悉用兵取勝之荣固非一定之制見敵之形始可施爲不可先事而言也梅堯臣曰臨敵應變制宜豈可預前言之王晳曰夫校計行兵是謂常法若乘機決勝則不可預傳述也張預曰言上所陳之事乃兵家之勝荣須臨敵制宜不可以預先傳言也夫未戰而廟筭勝者得筭多也未戰而廟筭不勝者得筭少也多筭勝少筭不勝而況於無筭乎吾以此觀之勝負見矣曹操曰以吾道觀之矣李筌曰夫戰者決勝廟堂然後與人爭利凡伐叛懷逺推亡固存兼弱攻昧皆物情之所出中外離心如啇周之師者是爲未戰而廟筭勝太一遁甲置筭之法因六十筭已上爲多筭六十筭已下爲少筭客多筭臨少筭主人敗客少筭臨多筭主人勝此皆勝敗易見矣杜牧曰廟筭者計筭於廟堂之上也梅堯臣曰多筭故未戰而廟謀先勝少筭故未戰而廟謀不勝是不可無筭矣王晳曰此懼學者惑不可先傳之說故復言計篇義也何氏曰計有巧拙成敗擊焉張預曰古者興師命將必致齋於廟授以成筭然後遣之故謂之廟筭籌荣深逺則其計所得者多故未戰而先勝謀慮淺近則其計所得者少故未戰而先負多計勝少計其無計者安得無敗故曰勝兵先勝而後求戰敗兵先戰而後求勝有計無計勝負易見孫子集註卷之一
