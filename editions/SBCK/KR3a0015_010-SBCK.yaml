  text: 孫子集註卷之十
  hash: sha256:34bb39f2d0661507c5fb5509d91b580580083ec79f817729931ed3809e9f2677
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0015_SBCK_010-1a}
body:
  text: 地􅄱篇曹操曰欲戰審地形以立勝也李筌曰軍出之後必有地形變動王晳曰地利當周知險隘支挂之形也張預曰凡軍有所行先五十里内山川形勢使軍士伺其伏兵將乃自行視地之勢因而圖之知其險易故行師越境審地形而立勝故次行軍孫子曰地􅄱有通者梅堯臣曰道路交達有挂者梅堯臣曰網羅之地往必掛綴有支者梅堯臣曰相持之地有隘者梅堯臣曰兩山通谷之間有險者梅堯臣曰山川丘陵也有遠者曹操曰此六者地之􅄱也梅堯臣曰平陸也杜佑曰此六地之名教民居之得便利則勝也張預曰地形有此六者之别也我可以往彼可以來曰通杜佑曰謂俱在平陸往來通利也張預曰俱在平陸往來通達通形者先居高陽利糧道以戰則利曹操曰寧致人無致於人李筌曰先之以待敵杜牧曰通者四戰之地須先據高陽之處勿使敵人先得而我後至也利糧道者毎於津阨或敵人要衝則築壘或作甬道以護之賈林曰通利者無有岡坂亦無要害故兩通往來處高易于望􅃸向陽視生通糧道便易轉運於此利於戰也杜佑曰寧致人無致於人巳先據高地分爲屯守於歸來之路無使敵絶巳糧道也梅堯臣曰先據高陽利糧通阨敵人來至我戰則利王晳註同曹操何氏同杜佑註張預曰先處戰地以待敵則致人而不致於人我雖居高面陽坐以致敵亦慮敵人不來赴戰故須使糧餉不絶然後爲利可以往難以返曰挂杜佑曰掛者牽掛也挂形者敵無備出而勝之敵若有備出而不勝難以返不利李筌曰徃難以返曰挂杜牧曰挂者險阻之地與敵共有犬牙相錯動有挂礙也徃攻敵敵若無備攻之必勝則雖與險阻相錯敵人巳敗不得復邀我歸路矣若徃攻敵人敵人有備不能勝之則爲敵人守險阻邀我歸路難以返也陳皥曰不得已陷在此則須爲持乆之計掠取敵人之糧以伺利便而擊之杜佑曰敵無備出攻之勝可也有備不得勝之則難還返也梅堯臣曰出其不意徃則獲利若其有備徃必受制張預曰察知敵情果爲無備一舉而勝之則可矣若其有備出而弗克欲戰則不可留欲歸則不得返非所利也我出而不利彼岀而不利曰支杜佑曰支乆也俱不便乆相持也張預曰各守險固以相支持支形者敵雖利我我無出也引而去之令敵半出而擊之利李筌曰支者兩俱不利如挂之形故各分其勢杜牧曰支者我與敵人各守高險對壘而軍中有平地狹而且長出軍則不能成陳遇敵則自下禦上彼我之勢俱不利便如此則堂堂引去伏卒待之敵若躡我候其半岀發兵擊之則利若敵人先去以誘我我不可岀也陳皥曰此􅀃理繁而語倒但彼此出軍地形不便敵若設利誘我而去我愼勿追之我若引去敵止則巳􅀂來襲我候其半出則􅇥擊之賈林曰支者隔險阻可以相要截足得相支持故不利先出也杜佑曰利利我也佯背我去我無出逐待其引而擊之可敗也梅堯臣曰各居所險先出必敗利而誘我我不可愛僞去引敵半出而擊王晳曰敵不肯至則設奇伏而退且詭之令必出張預曰利我謂佯背我去也不可岀攻我捨險則反爲所乗當自引去敵若來追伺其半岀行列未定銳卒攻之必獲利焉李靖兵法曰彼此不利之地引而佯去待其半岀而邀擊之隘形者我先居之必盈之以待敵杜佑曰盈滿也以兵陳滿隘形欲使敵不得進退也若敵先居之盈而勿從不盈而從之曹操曰隘形者兩山間通谷也敵勢不得撓我也我先居之必前齊隘口陳而守之以岀竒也敵若先居此地齊口陳勿從也卽半隘陳者從之而與敵共此利也李筌曰盈平也敵先守隘我去之趙不守井陘之口韓信下之陳豨不守漳水高祖下之是也杜牧曰盈者滿也言遇兩山之間中有通谷則須當山口爲營與兩山口齊如水之在器而盈滿也杜佑曰謂齊口亦滿也如水之滿器與口齊也􅀂我居之平易險阻皆制在我然後出奇以制敵􅀂敵人據隘之半不知齊口滿盈之道我則入隘以從之蓋敵亦在隘我亦在隘俱得地形勝敗在我不在地形也夫齊口盈滿之術非惟隘形獨解有口譬如平坡㢠澤車馬不通舟楫不勝中有一逕亦須據其路口使敵不得進也諸可知矣陳皥曰隘口言陳是也言營非也賈林曰從逐也盈實也敵􅀂實而滿之則不可逐討􅀂虚而無備則入而討之梅堯臣同杜牧註王晳同曹操註張預曰左右髙山中有平谷我先至之必齊滿山口以爲陳使敵不得進也我可以出奇兵彼不能以撓我敵􅀂先居此地盈塞隘口而陳者不可從也􅀂雖守隘口俱不齊滿者入而從之與敵共此險阻之利吳起曰無當天竈天竈者大谷之口言不可迎隘口而居之也險形者我先居之必居髙陽以待敵杜佑曰居高陽之地以待敵人敵人從其下隂而來擊之則勝􅀂敵先居之引而去之勿從也曹操曰地形險隘尤不可致於人李筌曰􅀂險阻之地不可後於人杜牧曰險者山峻谷􅀷非人力所能作爲必居高陽以待敵􅀂敵人先據之必不可以爭則當引去陽者南面之地恐敵人持久我居隂而生疾也今􅀂於崤澠遇敵則先據北山此乃是面隂而背陽也高陽二者止可捨陽而就高不可捨高而就陽孫子乃統而言之也杜佑曰地險先據則不致於人也梅堯臣曰先得險固居高就陽待敵則强敵茍先之就戰則殆引去勿疑王晳曰此亦爭地􅀂唐太宗先據武牢以待竇建德是也張預曰平陸之地尚宜先據況險阨之所豈可以致於人故先處髙陽以佚待勞則勝矣􅀂敵已據此地宜速引退不可與戰裴行儉討突厥嘗際晚下營壍壘方周忽令移就崇岡將士不恱以謂不可勞衆行儉不從速令徙之是夜風雨暴至前設營所水􅀷丈餘將吏驚服以此觀之居高陽不惟戰便亦無水澇之患也遠形者勢均難以挑戰戰而不利曹操曰挑戰者延敵也李筌曰力敵而挑則利未可知也杜牧曰譬如我與敵壘相去三十里􅀂我來就敵壘而延敵欲戰者是我困敵銳故戰者不利􅀂敵來就我壘延我欲戰者是我佚敵勞敵亦不利故言勢均然則如何曰欲必戰者則移相近也陳皥曰夫與敵營壘相遠兵力又均難以挑戰戰則不利故下文云勢均以一擊十曰走是也夫挑戰先須料我兵衆强弱可以加敵則爲之不然則不可輕進自取敗也孟氏曰兵勢旣均我遠入挑則不利也杜佑曰挑迎敵也遠形去國遠也地勢均等無獨便利先挑之戰不利也梅堯臣曰勢旣均一挑戰則勞致敵則佚王晳曰以遠致我勞也張預曰營壘相遠勢力又均止可坐以致敵不宜挑人而求戰也凡此六者地之道也將之至任不可不察也李筌曰此地形之勢也將不知者以敗賈林曰天生地形可以目察梅堯臣曰夫地形者􅂇兵立勝之本豈得不度也張預曰六地之形將不可不知故兵有走者有弛者有陷者有崩者有亂者有北者凡此六者非天之災將之過也賈林曰走弛陷崩亂北皆敗壞大小變易之名也張預曰凡此六敗咎在人事夫勢均以一擊十曰走曹操曰不料力李筌曰不量力也􅀂得形便之地用奇㐲之計則可矣杜牧曰夫以一擊十之道先須敵人與我將之智謀兵之勇怯天時地利飢飽勞佚十倍相懸然後可以奮一擊十􅀂勢均力敵不能自料以我之一擊敵之十則須奔走不能返舍復爲駐止矣梅堯臣曰勢雖均而兵甚寡以寡擊衆必走之道也王晳曰不待鬭而走也張預曰勢均謂將之智勇兵之利鈍一切相敵也夫體敵勢等自不可輕戰況奮寡以擊衆能無走乎卒强吏弱曰弛曹操曰吏不能統故弛壞杜牧曰言卒伍豪强將帥懦弱不能驅率故弛坼壞散也國家長慶初命田布帥魏以伐王廷湊布長在魏魏人輕易之數萬人皆乗驢行營布不能禁居數月欲合戰兵士潰散布自剄身死賈林曰令之不從威之不服見敵則亂不壞何爲梅堯臣曰吏無統率者則軍政弛壞王晳同曹操註何氏曰言卒伍豪强將帥懦弱不能驅領故弛坼壞散也張預曰士卒豪悍將吏懦弱不能統轄約束故軍政弛壞也吳楚相攻吳公子光曰楚軍多寵政令不一帥賤而不能整無大威命楚可敗果大敗楚師也吏强卒弱曰陷曹操曰吏强欲進卒弱輙陷敗也李筌曰陷敗也卒弱不一則難以爲戰是以强陷也杜牧曰言欲爲攻取士卒怯弱不量其力强進之則陷沒於死地也陳皥曰夫人皆有血氣誰無􅃲敵之心􅀂將乏刑德士乏訓練則人皆懦怯不可用也賈林曰士卒皆羸鼓之不進吏强獨戰徒陷其身也梅堯臣曰吏雖强進不能激之以勇故陷於死王晳曰爲下所陷張預曰將吏剛勇欲戰而士卒素乏訓練不能齊勇同奮茍用之必陷於亡敗大吏怒而不服遇敵懟而自戰將不知其能曰崩曹操曰大吏小將也大將怒之而不猒服忿而赴敵不量輕重則心崩壞李筌曰將爲敵所怒不料强弱驅士卒如命者必崩壞杜牧曰春秋時楚子伐鄭􅀳師救之伍參言於楚子曰􅀳之從政者新未能行令其佐先縠剛愎不仁未肯用命其三帥者專行不獲聽而無上衆無適從此行也􅀳師必敗􅀳魏錡求公族未得而怒欲敗􅀳師請致師不許請使許之遂往請戰而還趙旃求􅀸未得請挑戰不許召盟許之與魏錡皆命而往卻克曰二憾往矣弗備必敗隨㑹曰若二子怒楚楚人乗我䘮師無日矣不如備之先縠曰不可隨㑹使鞏朔韓穿師七覆於敖前故上軍不敗而中軍下軍果敗七覆七處伏兵也敖山名也陳皥曰此大將無理而怒小將使之心內懷不服因縁怨怒遇敵便戰不顧能否所以大敗也賈林曰自上墮下曰崩大吏小將不相壓㐲崩壞之道將又不量己之能否不知卒之勇怯强與敵􅃲自取賊害豈非自上而崩乎梅堯臣曰小將心怒而不服遇敵怨懟而不顧自取崩敗者蓋將不知其能也王晳曰謂將怒不以理且不知禆佐之才激致其兇懟如山之崩壞也何氏曰三軍同力上下一心則勝也張預曰大凡百將一心三軍同力則能勝敵今小將恚怒而不服於大將之令意欲俱敗逢敵便戰不量能否故必崩覆􅀳伐秦荀偃行令是也曰雞鳴而駕唯余馬首是瞻欒書怒曰􅀳國之命未是有也遂棄之歸又趙穿惡􅁷騈而逐秦魏錡怒􅀳師而乗楚將弱不嚴敎道不明吏卒無常陳兵縱橫曰亂曹操曰爲將若此亂之道也李筌曰將或有一於此亂之道也杜牧曰言吏卒皆不拘常度故引兵出陳或縱或橫皆自亂之也賈林曰威令旣不嚴明士卒則無常禀如此軍幕不亂何爲謂將無嚴令賞罰不行之故梅堯臣曰懦而不嚴則士無常檢敎而不明則出陳縱橫不整亂之道也王晳曰亂者不勝其敗張預曰將弱不嚴謂將帥無威德也敎道不明謂敎閱無古法也吏卒無常謂將臣無久任也陳兵縱橫謂士卒無節制也爲將􅀂此自亂之道將不能料敵以少合衆以弱擊强兵無選鋒曰北曹操曰其勢􅀂此必走之兵也李筌曰軍敗曰北不料敵也杜牧曰衛公李靖兵法有戰鋒隊言㨂擇敢勇之士毎戰皆爲先鋒司馬法曰選良次兵益人之强註曰勇猛勁捷戰不得功後戰必選於前當以激致其銳氣也東􅀳大將軍謝玄北鎭廣陵時符堅强盛玄多募勇勁劉牢之何謙諸葛侃高衡劉􅁤田洛孫無終等以驍猛應募玄以牢之領精銳爲前鋒百戰百勝號爲北府兵敵人畏之所向必克也賈林曰兵鋒不選利鈍士卒不知勇怯如此用兵自取背道也梅堯臣曰不能量敵情以少當衆不能選精銳以弱擊强皆奔北之理也何氏曰夫士卒疲勇不可混同爲一一則勇士不勸疲兵因有所容出而不戰自敗也故兵法曰兵無選鋒曰北昔齊以伎擊强魏以武卒奮秦以銳士勝漢有三河俠士劒客奇材吳謂之解煩齊謂之決命唐謂之跳盪是皆選鋒之别名也兵之勝術無先於此凡軍衆旣具則大將勒諸營各選精銳之士須趫健出衆武藝格者部爲别隊大約十人選一人萬人選千人所選務寡要在必當擇腹心健將統率自大將親兵前鋒奇㐲之􅀋皆品量配之也張預曰設􅀂奮寡以擊衆驅弱以敵强又不選驍勇之士使爲先鋒兵必敗北也凡戰必用精銳爲前鋒者一則壯吾志一則挫敵威也故尉繚子曰武士不選則衆不强曹公以張遼爲先鋒而敗鮮卑謝玄以劉牢之領精銳而拒符堅是也凡此六者敗之道也陳皥曰一曰不量寡衆二曰本乏刑德三曰失於訓練四曰非理興怒五曰法令不行六曰不擇驍果此名六敗也將之至任不可不察也張預曰巳上六事必敗之道夫地形者兵之助也杜牧曰夫兵之主在於仁義節制而巳􅀂得地形可以爲兵之􅂇所以取勝也􅂇一作易陳皥曰天時不如地利孟氏曰地利待人而險賈林曰戰雖在兵得地易勝故曰兵之易也山可障水可灌高勝卑險勝平也王晳曰兵道則在人張預曰能審地形者兵之助耳乃未也料敵制勝者兵之本也料敵制勝計險阨遠近上將之道也杜牧曰饋用之費人馬之力攻守之便皆在險阨遠近也言􅀂能料此以制敵乃爲將臻極之道王晳曰料敵窮極之情險阨遠近之利害此兵道也何氏曰知敵知地將軍之職張預曰旣能料敵虚實强弱之情又能度地險阨遠近之形本末皆知爲將之道畢矣知此而用戰者必勝不知此而用戰者必敗杜牧曰謂知險阨遠近也梅堯臣曰將知地形又知軍政則勝不知則敗張預曰旣知敵情又知地利以戰則勝俱不知之以戰卽敗故戰道必勝主曰無戰必戰可也戰道不勝主曰必戰無戰可也李筌曰得戰勝之道必可戰也失戰勝之道必無戰可也立主人者發其行也杜牧曰主者君也黃石公曰出軍行師將在自專進退内御則功難成故聖主明王跪而推轂曰閫外之事將軍裁之孟氏曰寧違於君不逆士衆梅堯臣曰將在軍君命有所不受張預曰苟有必勝之道雖君命不戰可必戰也苟無必戰之道雖君命必戰可不戰也與其從令而敗事不􅀂違制而成功故曰軍中不聞天子之詔故進不求名退不避罪王晳曰皆忠以爲國也何氏曰進豈求名也見利於國家士民則進也退豈避罪也見其蹙國殘民之害雖君命使進而不進罪及其身不悔也唯人是保而利合於主國之寳也李筌曰進退皆保人非爲身也杜牧曰進不求戰勝之名退不避違命之罪也如此之將國家之珍寳言其少得也陳皥曰合猶歸也梅堯臣曰寧違命而取勝勿順命而致敗王晳曰戰與不戰皆在保民利主而巳矣張預曰進退違命非爲巳也皆所以保民命而合主利此忠臣國家之寳也視卒如嬰兒故可與之赴􅀷谿視卒如愛子故可與之俱死李筌曰􅀂撫之如此得其死力也故楚子一言三軍之士皆如挾纊也杜牧曰戰國時吳起爲將與士卒最下者同衣食卧不設席行不乗騎親裹贏糧與士卒分勞􅀂卒有病疽吳起吮之其卒毋聞而􅂘之或問曰子卒也而將軍自吮疽何爲而􅂘母曰往年吳公吮其父其父不旋踵而死於敵今復吮此子妾不知其死所矣梅堯臣曰撫而育之則親而不離愛而朂之則信而不疑故雖死與死雖危與危王晳曰以仁恩結人心也何氏曰如後漢段熲爲破羌將軍以征西羌行軍仁愛士卒傷者親自瞻省手爲裹瘡在邊十餘年未嘗一日蓐􅃦與將士同苦故皆樂爲死戰也􅀳王濬爲巴郡太守郡邊吳境兵士苦役生男多不舉濬乃嚴其科條寛其徭課其産育者皆與休復所全活者數千人及後伐吳先在巴郡之所全活者皆堪徭役供軍其父母戒之曰王府君生爾爾必勉之無愛死也故吳子有父子之兵張預曰將視卒如子則卒視將如父未有父在危難而子不致死故荀􅀸曰臣之於君也下之於上也如子弟之事父兄手足之捍頭目也夫美酒泛流三軍皆醉溫言一撫士同挾纊信乎以恩遇下古人所重也故兵法曰勤勞之師將必先巳暑不張蓋寒不重衣險必下歩軍并成而後飮軍食熟而後飯軍壘成而後舍厚而不能使愛而不能令亂而不能治譬􅀂驕子不可用也曹操曰恩不可專用罰不可獨任若驕子之喜怒對目還害而不可用也李筌曰雖厚愛人不合如驕子者有勃逆之心不可用也杜牧曰黃石公曰士卒可下而不可驕夫恩以養士謙以接之故曰可下制之以法故曰不可驕隂符曰害生於恩吳起曰夫鼓鼙金鐸所以威耳旌旗麾章所以威目禁令刑罰所以威心耳威於聲不得不淸目威於色不得不明心威於形不得不嚴三者不立必敗於敵故曰將之所撝莫不從移將之所指莫不前死衛公李靖曰古之善爲將者必能十卒而殺其三次者十殺其一十殺其三威振於敵國十殺其一令行於三軍是知畏我者不畏敵畏敵者不畏我善無細而不賞惡無微而不貶馬謖軍敗葛亮對泣而行誅鄕人盜笠吕蒙垂涕而後斬馬逸犯禾曹公割髪而自刑兩􅁺辭屈黃蓋詰問而俱斬故能威克其愛雖少必濟愛加其威雖多必敗孟氏曰唯務行恩恩勢巳成刑之必怨唯務行刑刑怨巳􅀷恩之不附必使恩威相參賞罰並用然後可以爲將可以統衆也梅堯臣曰厚養而不使愛寵而不敎亂法而不治猶如驕子安得而用也王晳曰恩不以嚴未可濟也何氏曰言恩不可純任純任則還爲巳害張預曰恩不可以專用罰不可以獨行專用恩則卒如驕子而不能使此曹公所以割髪而自刑卧龍所以垂泣而行戮楊素所以流血盈前而言笑自􅀂李靖所以十殺其三使畏我而不畏敵也獨行罰則士不親附而不可用此古將所以投酒楚子所以挾纊吳起所以分衣食闔閭所以同勞佚也在易之師初六曰師出以律謂齊衆以法也九二曰師中承天寵謂勸士以賞也以此觀之王者之兵亦徳刑參任而恩威並行矣尉繚子曰不愛恱其心者不我用也不嚴畏其心者不我舉也故善將者愛與畏而巳知吾卒之可以擊而不知敵之不可擊勝之半也梅堯臣曰知巳而不知彼或有勝耳知敵之可擊而不知吾卒之不可以擊勝之半也杜牧曰可擊者勇敢輕死也不可擊者頓弊怯弱也陳皥曰此􅀃非也可擊不可擊者所謂兵衆孰强士卒孰練賞罰孰明也梅堯臣曰知彼而不知巳或有勝耳王晳曰知巳不知彼知彼不知己皆未可以決勝也張預曰或知巳而不知彼或知彼而不知巳則有勝有􅀒也唐太宗曰吾嘗臨陳先料敵心與巳之心孰審然後彼可得而知焉察敵氣與巳之氣孰治然後我可得而知焉言料心審治亂察氣見强弱形也可戰與不可戰也知敵之可擊知吾卒之可以擊而不知地形之不可以戰勝之半也曹操李筌曰勝之半者未可知也杜牧曰地形者險易遠近岀入迂直也梅堯臣曰知彼知巳而不知地形亦或不勝王晳曰雖知彼巳可以戰然不可􅉛地利也張預曰旣知巳而又知彼但不得地形之􅂇亦不可全勝故知兵者動而不迷舉而不窮杜牧曰未動未舉勝負巳定故動則不迷舉則不窮也一云動而不困舉而不頓陳皡曰窮者困也我若識彼此之動否量地形之得失則進而不迷戰而不困者也梅堯臣曰無所不知則動不迷闇舉不困窮也王晳曰善計者不迷善軍者不窮張預曰不妄動故動則不誤不輕舉故舉則不困識彼我之虚實得地形之便利而後戰也故曰知彼知巳勝乃不殆張預曰曉攻守之術則有勝而無危知天知地勝乃不窮李筌曰人事天時地利三者同知則百戰百勝杜佑曰知地之便知天之時地之便依險阻向高陽也天之時順寒暑法刑德也旣能知彼知巳又按地形法天道勝乃可全又何難也梅堯臣曰知彼利知此利故不危知天時知地形故不極王晳同梅堯臣註張預曰順天時得地利取勝無極孫子集註卷之十
