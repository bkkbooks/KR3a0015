front:
  text: 孫子集註序
  hash: sha256:3095498c6ec9ede8a47d48145962344da9d6ad3a1ee543cf229525921206e9ed
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0015_SBCK_000-1a}
body:
  text: 歐陽文忠公撰四庫書目言孫子註二十餘家予􅀁見僅此漢有曺操唐有杜牧李筌陳皥孟氏賈林杜佑宋有張預梅堯臣王晢何氏諸家多托之空言而曺操則見之行事者也操甞為新書諸将征伐即以新書授之㴀者勝違者负今新書不傳而見扵李肃公問答者機權應變寔夲之孫子其註多隱辭引而不彂操之􅀁以如􅀑也杜牧自序云孫武死後凡千􅀊将兵者有成有敗勘其事跡皆與武所著書一一相拞當猶印圈模刻一不差跌予觧猶盤中赱丸横斜曲直計扵􅎔時不可盡知其必可知者知丸之不􅀎出扵盤也牧未甞用兵􅀚其與時􅈗論兵二書謂尚古兵柄本出儒術援古証今若繩裁刀觧使其言用山東不􅁕平矣陳皥註多指謪杜之謬誤人各有見未必為樊川病也李筌註依太乙遁甲雜引諸史以證太乙遁甲與今􅀁存書往往不同意古書散逸乆矣孟氏賈林杜佑即唐紀爕所集者岐公相業􅁕稱而文章議論亦炳煥傑出其註里居時撰見通典張預承􅊗代名将用兵制勝有合扵孫子者編次為傳扵孫子多所發眀梅尭臣註文忠公謂其當與三家並傳晦翁有定論矣孟氏賈林王晢何氏雖言人人殊而皆扵􅀚者有􅀁禆益此註之所以集也夫兵㐫器也不得已而用之者也然不素習扵承平之時而姑試于有事之日吾不知其可也故生而懸弧長而習射冬而講武凡人之所當知者也詩云文武吉甫萬􅀖為憲孔子曰有文事者必有武備又曰戚戰則克聖人之􅀁以敎者也余夙有四方之志每渉獵群書而􅀹嗜孫子孫子上謀而後攻􅁱道而保法論將則曰仁智信勇嚴與孔子合至扵戰守攻圍之道批抗擣虚之術山林險阻之􅀔料敵用間之謀靡不畢具其他韜鈐機略孰􅀎過之然其言约而該近而逺未易窺測今觀諸家􅀁註或本􅀮以之顯或由粗而識精或援史而證之以事或因言而實之以人扵是孫子之微詞奥義彰彰眀矣故曰孫子十三篇不惟武人根本攵士亦當盡心焉旨哉言乎予奉命􅇂軍虔䑓進武弁及生儒問之無有知是􅀞者故授之以梓以廣其傳嘉靖乙􅆗春正月榖日錫山談愷書于䖍臺之思歸軒孫子集註序
  hash: sha256:edecd6d59eb71f3ad2899b733e09198133321c76ca8b4b9ffb27e076278143b1
