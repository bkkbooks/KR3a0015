  text: 孫子集註卷之十一
  hash: sha256:667047fc8d8459cba7bdc3e86d1b97685334c4cc5b112dd018916ac823136a4d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0015_SBCK_011-1a}
body:
  text: 九地篇曹操日欲戰之地有九李筌曰勝敵之地有九故次地形之下王晢曰用兵之地利害有九也張預曰用兵之地其勢有九此論地􅀔故次地形孫子曰用兵之法有散地有輕地有爭地有交地有衢地有重地有圯地有圍地有死地曹操曰此九地之名也張預曰此九地之名諸侯自戰其地爲散地曹操曰士卒戀土道近易散李筌曰卒恃土懷妻子急則散是爲散地也杜牧曰士卒近家進無必死之心退有歸投之處杜佑曰戰其境内之地士卒意不專有潰散之心故曰散地梅堯臣同杜牧註王晳同曹操註何氏曰散地士卒恃之懷戀妻子急則散走是爲散地一曰地無關鍵士卒易散走居此地者不可數戰又曰地遠四平更無要害志意不堅而易離故曰散地吳王問孫武曰散地士卒顧家不可與戰則必固守不出􅀂敵攻我小城掠吾田野禁吾樵採塞吾要道待吾空虚而急來攻則如之何武曰敵人􅀷入吾都多背城邑士卒以軍爲家專志輕􅃲吾兵在國安土懷生以陳則不堅以􅃲則不勝當集人各衆聚榖蓄帛保城備險遣輕兵絶其糧道彼挑戰不得轉輸不至野無所掠三軍困餒因而誘之可以有功􅀂欲野戰則必因勢依險設㐲無險則隱於天氣隂晦昏霧出其不意襲其懈怠可以有功張預曰戰於境内士卒顧家是易散之地也鄖人將伐楚師楚􅃲廉曰鄖人軍其郊必不誡恃近其城莫有􅃲志果爲楚所敗是也入人之地而不􅀷者爲輕地曹操曰士卒皆輕返也杜牧曰師出越境必焚舟梁示民無返顧之心李筌曰輕於退也梅堯臣曰入敵未遠道近輕返王晳曰􅀄􅍱敵境勢輕士未有􅃲志也何氏曰輕地者輕於退也入敵境未􅀷往返輕易不可止息將不得數動勞人吳王問孫武曰吾至輕地始入敵境士卒思還難進易退未背險阻三軍恐懼大將欲進士卒欲退上下異心敵守其城壘整其車騎或當吾前或擊吾後則如之何武曰軍至輕地士卒未專以入爲務無以戰爲故無近其名城無由其通路設疑佯惑示􅀂將去選驍騎㗸枚先入掠其牛馬六畜三軍見得進乃不懼分吾良卒密有所㐲敵人􅀂來擊之勿疑􅀂其不至捨之而去又曰軍入敵境敵人固壘不戰士卒思歸欲退且難謂之輕地當選驍兵伏要路我退敵追來則擊之也張預曰始入敵境士卒思還是輕返之地也尉繚子曰征役分軍而歸或臨戰自北則逃傷甚焉言民兵四集分屯占地使北來者當北道則多逃以其開之耳我得則利彼得亦利者爲爭地曹操曰可以少勝衆弱擊强李筌曰此阨喉守險地先居者勝是爲爭地也杜牧曰必爭之地乃險要也前秦符堅先遣大將吕先討西域堅敗績後光自西域還師至宜禾堅涼州刺史梁熈謀拒之高昌太守楊翰曰吕光新定西國兵强氣銳其鋒不可當􅀂出流沙其勢難測高梧谷口險要宜先守之而奪其水彼旣困竭人自然投戈如以爲遠不可守伊吾之關亦可拒之􅀂廢此二要難爲計矣地有所必爭眞此機也熈不從竟爲光所滅也陳皥曰彼我􅀂先得其地者則可以少勝衆弱勝强也杜佑曰謂山水阨口有險固之利兩敵所爭梅堯臣曰無我無彼先得則利王晳同陳皥註何氏曰爭地便利之地先居者勝是以爭之吳王問孫武曰敵􅀂先至據要保利簡兵練卒或出或守以備我奇則如之何武曰爭地之法先據爲利敵得其處愼勿攻之引而佯走建旗鳴鼓趣其所愛曵柴揚塵惑其耳目分吾良卒宻有所㐲敵必出救人欲我與人棄我取此爭先之道也􅀂我先至而敵用此術則選吾銳卒固守其所輕兵追之分㐲險阻敵人還􅃲㐲兵旁起此全勝之道張預曰險固之利彼我得之皆可以少勝衆弱勝强者是必爭之地也唐太宗以三千人守成臯之險坐困竇建德十萬之衆是也我可以往彼可以來者爲交地曹操曰道正相交錯也杜牧曰川廣地平可來可往足以交戰對壘陳皥曰交錯是也言其道路交横彼我可以來往如此之地則須兵士首尾不絶切宜備之故下文云交地吾將謹其守其義可見也杜佑曰交地有數道往來交相無可絶梅堯臣同陳皥註何氏曰交地平原交通也一曰可以交結不可杜絶之絶之致􅂩又曰交通四遠不可遏絶吳王問孫武曰交地吾將絶敵使不得來必令吾邊城修其守備􅀷絶通路固其隘塞􅀂不先圖之敵人已備彼可得而來吾不得而往衆寡又均則如之何武曰旣我不可以往彼可以來吾分卒匿之守而易怠示其不能敵人且至設㐲隱廬出其不意可以有功也張預曰地有數道往來通達而不可阻絶者是交錯之地也諸侯之地三屬曹操曰我與敵相當而旁有他國也孟氏曰􅀂鄭界於齊楚􅀳是也先至而得天下之衆者爲衢地曹操曰先至得其國􅂇也李筌曰對敵之傍有一國爲之屬先往而通之得其衆也杜牧曰衢地者三屬之地我須先至其衝據其形勢結其旁國也天下猶言諸侯也梅堯臣曰彼我相當有旁國三面之㑹先至則得諸侯之助也王晳曰曹公云先至得其國助晳謂先至者結交先至也言天下者謂能廣􅂇則天下可從何氏曰衢地者地要衝控帶數道先據此地衆必從之故得之則安失之則危也吳王問孫武曰衢地必先􅀂吾道遠發後雖馳車驟馬至不能先則如之何武曰諸侯參屬其道四通我與敵相當而旁有他國所謂先者必先重幣輕使約和旁國交親結恩兵雖後至衆已屬矣我有衆助彼失其黨諸國掎角震鼓齊攻敵人驚恐莫知所當張預曰衢者四通之地我所敵者當其一面而旁有鄰國三面相連屬當往結之以爲已援先至者謂先遣使以重幣約和旁國也兵雖後至巳得其國助矣入人之地􅀷背城邑多者爲重地曹操曰難返之地李筌曰堅志也白起攻楚樂毅伐齊皆爲重地杜牧曰入人之境已􅀷過人之城巳多津梁皆爲所恃要衝皆爲所據還師返斾不可得也杜佑曰難返還也背去也背與倍同多道里也遠去已城郭􅀷入敵地心專意一謂之重地也梅堯臣曰乗虚而入渉地愈􅀷過城已多津要絶塞故曰重難之地王晳曰兵至此者事勢重也何氏曰重地者入敵巳􅀷國糧難應資給將士不掠食取吳王問孫武曰吾引兵􅀷入重地多所踰越糧道絶塞設欲歸還勢不可過欲食於敵持兵不失則如之何武曰凡居重地士卒輕勇轉輸不通刖掠以繼食下得粟帛皆貢於上多者有賞士卒無歸意若欲還出卽爲戒備􅀷溝高壘示敵且乆敵疑通途私除要害之道乃令輕車㗸枚而行以牛馬爲餌敵人􅀂出鳴鼓隨之隂㐲吾士與之中期内外相應其敗可知也張預曰􅀷渉敵境多過敵城士卒心專無有歸志是難退之地也司馬景王謂諸葛恪卷甲􅀷入其鋒不可當是也行山林險阻沮澤凡難行之道者爲圯地曹操曰少固也賈林曰經水所毀曰圯沮洳圯地不得乆留宜速去也梅堯臣曰水所毀圯行則猶難況戰守乎何氏曰圯地者少固之地也不可爲城壘溝隍宜速去之吳王問孫武曰吾入圯地山川險阻難從之道行乆卒勞敵在吾前而㐲吾後營在吾左而守吾右良車驍騎要吾隘道則如之何武曰先進輕車去軍十里與敵相候接期險阻或分而左或分而右大將四觀擇空而取皆㑹中道倦而乃止張預曰險阻漸洳之地進退艱難而無所依所由入者隘所從歸者迂彼寡可以擊吾之衆者爲圍地李筌曰舉動難也杜牧曰出入艱難易設奇㐲覆勝也杜佑曰所從入阨險歸道遠也持乆則糧乏故敵可以少擊吾衆者爲圍地也梅堯臣曰山川圍繞入則隘歸則迂也何氏曰圍地入則隘險歸則迂回進退無從雖衆何用能爲奇變此地可由吳王問孫武曰吾入圍地前有强敵後有險難敵絶我糧道利我走勢敵鼓譟不進以觀吾能則如之何武曰圍地之宜必塞其闕示無所往則以軍爲家萬人同心三軍齊力幷炊數日無見火煙故爲毀亂寡弱之形敵人見我備之必輕則告勵士卒令其􅁬怒陳㐲良卒左右險阻擊鼓而出敵人􅀂當疾擊務突我刖前􅃲後拓左右椅角也又曰敵在吾圍㐲而􅀷謀示我以利縈我以旗紛紜􅀂亂不知所之柰何武曰千人操旌分塞要道輕兵進挑陳而勿摶交而勿去此敗謀之法張預曰前狹後險之地一人守之千人莫向則以奇㐲勝疾戰則存不疾戰則亡者爲死地曹操曰前有高山後有大水進則不得退則有礙李筌曰阻山背水食盡利速不利緩也杜牧曰衛公李靖曰或有進軍行師不因鄕導陷於危敗爲敵所制左谷右山束馬懸車之逕前窮後絶鴈行魚貫之巖兵陳未整而强敵忽臨進無所息退無所固求戰不得自守莫安駐則日月稽留動則首尾受敵野無水草軍乏資糧馬困人疲智窮力極一人守隘萬夫莫向如彼要害敵先據之如此之利我已失守縱有驍兵利器亦何以施其用乎􅀂此死地疾戰則存不疾戰則亡當須上下同心倂氣一力抽腸濺血一死於前因敗爲功轉禍爲福此乃是也陳皥曰人在死地如坐漏􅂳㐲燒屋賈林曰左右高山前後絶澗外來則易内出則難誤居此地速爲死戰則生􅀂待士卒氣挫糧儲又無而持乆不死何待梅堯臣曰前不得進後不得退旁不得走不得不速戰也何氏曰死地力戰或生守隅則死吳王問孫武曰吾師出境軍於敵人之地敵人大至圍我數重欲突以出四塞不通欲勵士激衆使之投命潰圍則如之何武曰􅀷溝高壘示爲守備安靜勿動以隱吾能告令三軍示不得巳殺牛燔車以饗吾士燒盡糧食塡夷井竈割髮捐冠絶去生慮將無餘謀士有死志於是砥甲礪刃幷氣一力或攻兩旁震鼓疾譟敵人亦懼莫知所當銳卒分行疾攻其後此是失道而求生故曰困而不謀者窮窮而不戰者亡吳王曰􅀂吾圍敵則如之何武曰山峻谷險難以踰越謂之窮冦擊之之法㐲卒隱廬開其去道示其走路求生透出必無􅃲意因而擊之雖衆必破兵法又曰􅀂敵人在死地士卒勇氣欲擊之法順而勿抗隂守其利必開去道以精騎分塞要路輕兵進而誘之陳而勿戰敗謀之法也張預曰山川險隘進退不能糧絶於中敵臨於外當此之際勵士決戰而不可緩也是故散地則無戰李筌曰恐走散也杜牧曰已具其上賈林曰地無􅀜闥卒易散走居此地者不可數戰地􅄱之􅀃一家之理􅀂號令嚴明士卒愛服死且不顧何散之有梅堯臣曰我兵在國安土懷生陳則不堅􅃲則不勝是不可以戰也王晳曰決於戰則懼散張預曰士卒懷生不可輕戰吳王問孫武曰散地不可戰則必固守不出􅀂敵攻我小城掠吾田野禁吾樵採塞吾要道待吾空虚而來急攻則如之何武曰敵人􅀷入專志輕鬭吾兵安土陳則不堅戰則不勝當集人聚穀保城備險輕兵絶其糧道彼挑戰不得轉輸不至野無所掠三軍困餒因而誘之可以有功􅀂欲野戰則必因勢依險設㐲無險則隱於隂晦出其不意襲其􅈈怠輕地則無止李筌曰恐逃杜牧曰兵法之所謂輕地者出軍行師始入敵境未背險要士卒思還難進易退以入爲難故曰輕地北當必選精騎宻有所㐲敵人卒至擊之勿疑􅀂是不至踰之速去杜佑曰志未堅不可遇敵梅堯臣曰始入敵境未背險阻士心不專無以戰爲勿近名城勿由通路以速進爲利王晳曰無故不當止也張預曰士卒輕返不可輙留吳王曰士卒思還難進易退未背險阻三軍恐懼則如之何武曰軍在輕地士卒未專以入爲務無以戰爲故無近其名城無由其通路設疑佯惑示若將去乃選精騎㗸枚先入掠其六畜三軍見得進乃不懼分吾良卒宻有所㐲敵人􅀂來擊之勿疑􅀂其不至捨之而去爭地則無攻曹操曰不當攻當先至爲利也李筌曰敵先居地險不可攻杜牧曰無攻者謂敵人若已先得其地則不可攻王晳曰敵居形勝之地先據乎利而我不得其處則不可攻張預曰我欲往而爭之而敵已先至也吳王曰敵􅀂先至據要保利簡兵練卒或出或守以備我奇則如之何武曰爭地之法讓之者得求之者失敵得其處愼勿攻之引而佯走建旗鳴鼓趣其所愛焚柴揚塵惑其耳目分吾良卒宻有所㐲敵必出救人欲我與人棄我取此爭先之道也􅀂我先至而敵用此術則選吾銳卒固守其所輕兵追之分㐲險阻敵人還鬭㐲兵旁起此全勝之道也交地則無絶曹操曰相及屬也李筌曰不可絶間也杜牧曰川廣地平四面交戰須車騎部伍首尾聮屬不可使之斷絶恐敵人因而乗我賈林曰可以交結不可杜絶絶之致􅂩杜佑曰相及屬也俱可進退不可以兵絶之梅堯臣曰道旣錯通恐其邀截當令部伍相及不可斷也王晳曰利糧道也交相往來之地亦謂之通地居高陽以待敵宜無絶糧道張預曰往來交通不可以兵阻絶其路當以奇㐲勝也吳王曰交地吾將絶敵使不得來必令吾邊城修其守備􅀷絶通道固其隘塞􅀂不先圖之敵人巳備彼可得而來吾不得而往衆寡又均則如之何武曰旣我不可以往彼可以來則分卒匿之守而易怠示其不能敵人且至設㐲隱廬出其不意衢地則合交曹操曰結諸侯也李筌曰結行也杜牧曰諸侯之交又云旁國也孟氏曰得交則安失交則危也梅堯臣曰地處四通何以得天下之助當以重幣合王晳曰四通之境非交援不强張預曰四通之地先交結旁國也吳王曰衢地貴先􅀂吾道遠而發後雖馳車驟馬至不得先則如之何武曰諸侯參屬其道四通我與敵相當而旁有他國所謂先者必重幣輕使約和旁國交親結恩兵雖後至衆巳屬矣簡兵練卒阻利而處我有衆助彼失其黨諸國掎角敵人莫當重地則掠曹操曰畜積糧食也李筌曰􅀷入敵境不可非義失人心也漢高祖入秦無犯婦女無取寳貨得人心如此筌以掠字爲無掠字杜牧曰言居於重地進未有利退復不得則須運糧爲持乆之計以伺敵也孟氏曰因糧於敵也梅堯臣曰去國旣遠多背城邑糧道必絶則掠畜積以繼食王晳曰􅀷入敵境則掠其饒野以豐儲也難地食少則危張預曰􅀷入敵境饋餉不繼當勵士掠食以備其乏也吳王曰重地多逾城邑糧道絶塞設欲歸還􅀔不可過則如之何武曰凡居重地士卒輕勇轉輸不通則掠以繼食下得粟帛皆貢於上多者有賞􅀂欲還出􅀷溝高壘示敵且乆敵疑通途私除要害乃令輕車㗸枚而行揚其塵埃餌以牛馬敵人􅀂出鳴鼓隨之隂㐲吾士與之中期内外相應其敗可知圯地則行曹操曰無稽留也李筌曰不可爲溝隍宜急去之梅堯臣曰旣毀圯不可依止則當速行勿稽留也王晳曰合聚軍衆圯無舍止張預曰難行之地不可稽留也吳王曰山川險阻難從之道行乆卒勞敵在吾前而㐲吾後營在吾左而守吾右良車驍􅀐要吾隘道則如之何武曰先進輕車去軍十里與敵相候接期險阻或分而左或分而右大將四觀擇空而取皆㑹中道倦而乃止圍地則謀曹操曰發竒謀也李筌曰智者不困杜牧曰難阻之地與敵相持須用竒險詭譎之計杜佑曰居此當權謀詐譎可以免難梅堯臣曰前有隘後有險歸道又迂則發謀慮以取勝張預曰難以力勝易以謀取也吳王曰前有强敵後有險難敵絶我糧道利我走勢彼鼓譟不進以觀吾能則如之何武曰圍地必塞其闕示無所往則以軍爲家萬人同心三軍齊力幷炊數日無見火煙故爲毁亂寡弱之形敵人見我備之必輕則告勵士卒令其􅁬怒陳練良卒左右險阻擊鼓而出敵人􅀂當疾擊務突則前􅃲後拓左右掎角死地刖戰曹操曰死地戰也李筌曰殊死戰不求陳皥曰陷在死地則軍中人人自戰故曰置之死地而後生也賈林曰力戰或生守隅則死梅堯臣曰前後左右無所之示必死人人自戰也張預曰陷在死地則人自爲戰吴王曰敵人大至圍我數重欲突以出四塞不通欲勵士激衆使之投命則如之何武曰􅀷溝高壘安靜勿動告令三軍示不得巳殺牛燔車以饗吾士燒盡糧食塡夷井竈割髮􅂢􅃣絶去生慮砥甲礪刃幷氣一力或攻兩旁震鼓疾譟敵人亦懼莫知所當銳卒分行疾攻其後此是失道而求生故曰困而不謀者窮窮而不戰者亡所謂古之善用兵者能使敵人前後不相及梅堯臣曰設竒衝掩衆寡不相恃梅堯臣曰驚撓之也貴賤不相救梅堯臣曰散亂也上下不相收梅堯臣曰倉惶也卒離而不集兵合而不齊李筌曰設變以疑之救左則擊其右惶亂不暇計杜牧曰多設變詐以亂敵人或衝前掩後或驚東擊西或立僞形或張竒􅀔我則無形以合戰敵則必備而衆分使其意懾離散上下驚擾不能和合不得齊集此善用兵也孟氏曰多設疑事出東見西攻南引北使彼狂惑散擾而集聚不得也梅堯臣曰或已離而不能集或雖合而不能齊王晳曰將有優劣則然要在於竒正相生手足相應也張預曰出其不意掩其無備驍兵銳卒猝然突擊彼救前刖後虚應左刖右􅂩使倉惶散亂不知所禦將吏士卒不能相赴其卒巳散而不復聚其兵雖合而不能一合於利而動不合於利而止曹操曰暴之使離亂之使不齊動兵而戰李筌曰撓之令見利乃動不亂則止梅堯臣曰然能使敵􅀂此當須有利則動無利則止張預曰彼雖驚擾亦當有利則動無利刖止敢問敵衆整而將來待之􅀂何曹操曰或問也梅堯臣曰此設疑以自問言敵人甚衆將又嚴整我何以待之耶張預曰前所陳者須兵衆相敵然後可爲故或人問於我而又整肅則以何術待之也曰先奪其所愛則聽矣曹操曰奪其所恃之利若先據利地刖我所欲必得也李筌曰孫子故立此問者以此爲祕要也所愛謂敵所便愛也或財帛子女吾先困辱之則敵進退皆聽也杜牧曰據我便地略我田野利其糧道斯三者敵人之所愛惜倚恃者也􅀂能俱奪之則敵人雖强進退勝敗皆須聽我也陳皥曰愛者不止所恃利但敵人所顧之事皆可奪也梅堯臣曰階先奪其所顧愛則我志得行然後使其驚撓散亂無所不至也王晳曰先據利地以竒兵絶其糧道則如我之謀也張預曰武曰敵所愛者便地與糧食耳我先奪之則無不從我之計兵之情主速乗人之不及由不虞之道攻其所不戒也曹操曰孫子應難以覆陳兵情也李筌曰不虞不戒破敵之速杜牧曰此統言兵之情狀以乗敵間隙由不虞之道攻其不戒之處此乃兵之􅀷情將之至事也陳皥曰此言乗敵人有不及不虞不戒之便則須速進不可遲疑也蓋孫子之㫖言用兵貴疾速也梅堯臣曰兵機貴速當乗人之不備乗人之不備者行不虞之道攻不戒之所也王晳曰兵上神速奪愛尤當然也何氏曰如蜀將􅀄達之降魏魏朝以達領新城太守達復連吳固蜀濳圖中國謀洩司馬宣王秉政恐達速發以書紿達以安之逹得書猶與不決宣王乃濳軍進討諸將皆言達與二賊交構宜審察而後動宣王曰達無信義此其相疑之時也當及其未定往討之乃倍道兼行八日到其城下吳蜀各遣其將向西城安橋木闌塞以救達宣王分諸將拒之初達與諸葛亮書曰宛去洛八百里去吾一千一百里聞吾舉事當表上天子比相反覆一月間也刖吾城已固諸軍足辦所在􅀷險司馬公必不自來諸將來吾無患矣及兵到達又告亮曰吾舉事八日而兵至城下何其神速也上庸城三面阻水達於城下爲木柵以自固宣王渡水破其柵􅀡造城下八道攻之旬有六日達甥郡賢將李輔等開門出降遂斬達李靖征蕭銑集兵於夔州銑以時屬秋潦江水泛漲三峽路陷必謂靖不能進遂休兵不設備九月靖乃率師而進將下峽諸將皆請停兵待水退靖曰兵貴神速機不可失今兵始集銑尚未知􅀂乗水漲之勢倐忽至城下所謂疾雷不及掩耳此兵家上䇿縱彼知我倉卒徵兵無以應敵此必成擒也遂降蕭銑衛公兵法曰兵用上神戰貴其速簡練士卒申明號令曉其目以麾幟習其耳以鼓金嚴賞罰以誡之重芻豢以養之浚溝壍以防之指山川以導之召才能以任之述竒正以教之如此則雖敵人有雷電之疾而我則有所待也􅀂兵無先備則不應卒卒不應則失於機失於機則後於事後於事則不制勝而軍覆矣故吕氏春秋云凡兵者欲急捷所以一決取勝不可乆而用之矣故曰兵之情雖主速乗人之不及然敵將多謀戎卒輯睦令行禁止兵利甲堅氣銳而嚴力全而勁豈可速而犯之邪答曰􅀂此刖當卷迹藏聲蓄盈待竭避其鋒勢與其持乆安可犯之哉廉頗之拒白起守而不戰宣王之抗武侯抑而不進是也張預曰復謂或人曰用兵之理惟尚神速所貴乎速者乗人之倉卒使不及爲備也出兵於不虞之徑以掩其不戒故敵驚擾散亂而前後不相及衆寡不相待也凡爲客之道􅀷入則專主人不克李筌曰夫爲客􅀷入則志堅主人不能禦也杜牧曰言大凡爲攻伐之道􅀂􅀷入敵人之境士卒有必死之志其心專一主人不能勝我也克者勝也梅堯臣曰爲客者入人之地􅀷則士卒專精主人不能克我張預曰􅀷渉敵境士卒心專則爲主者不能勝也客在重地主在輕地故耳趙廣武君謂韓信去國遠􅃲其鋒不可當是也掠於饒野三軍足食王晳曰饒野多稼穡謹養而勿勞倂氣積力運兵計謀爲不可測曹操曰養士倂氣運兵爲不可測度之計李筌曰氣盛力積加之以謀慮則非敵之可測杜牧曰斯言􅀷入敵人之境須掠田野使我足食然後閉壁養之勿使勞苦氣全力盛一發取勝動用變化使敵人不能測我也陳皥曰所處之野須水草便近積蓄不乏謹其夾往善撫士卒王翦伐楚楚人挑戰翦不出勤於撫御幷兵一力聞士卒投石爲戲知其養勇思􅀾然後用之一舉遂滅楚但􅀷入敵境未見可勝之利則須爲此計梅堯臣曰掠其富饒以足軍食息人之力幷兵爲不可測之計王晳曰謹養謂撫循飮食周謹之也幷銳氣積餘力形藏謀密使敵不測俟其有可勝之隙則進之張預曰兵在重地須掠糧於富饒之野以豐吾食乃堅壁自守勤撫士卒勿任以勞苦令氣盛而力全常爲不可測度之計伺敵可擊則一舉而克王翦伐荆常用此術投之無所往死且不北李筌曰能得其力者投之無往之地杜牧曰投之無所往謂前後進退皆無所之士以此皆求力戰雖死不北也梅堯臣曰置在必戰之地知死而不退走張預曰置之危地左右前後皆無所往則守戰至死而不奔北矣死焉不得曹操曰士死安不得也杜牧曰言士必死安有不得勝之理孟氏曰士死無不得也梅堯臣曰兵焉得不用命張預曰士卒死戰安不得志尉繚子曰一賊仗劒擊於市萬人無不避之者非一人之獨勇萬人皆不肖也必死與必生不侔也士人盡力曹操曰在難地心并也梅堯臣曰士安得不竭力以赴戰王晳曰人在死地豈不盡力何氏曰獸困猶鬭鳥窮則啄況靈萬物者人乎張預曰同在難地安得不共竭其力兵士甚陷則不懼杜牧曰陷於危險勢不獨死三軍同心故不懼也梅堯臣同杜牧註王晳曰陷之難地則不懼不懼則􅃲志堅也張預曰陷在危亡之地人持必死之志豈復畏敵也無所往則固􅀷入則拘曹操曰拘縛也李筌曰固堅也杜牧曰往走也言􅀷入敵境走無生路則人心堅固如拘􅅞者也梅堯臣曰投無所往則自然心固入􅀷則自然志專也張預曰動無所之人心堅固兵在重地走無所適則如拘係也不得巳則鬭曹操曰人窮則死戰也李筌曰決命杜牧曰不得巳者皆疑陷在死地必不生以死救死盡不得巳也則人皆悉力而鬭也梅堯臣何氏同杜牧註張預曰勢不獲巳須力鬭也是故其兵不修而戒不求而得不約而親不令而信曹操曰不求索其意自得力也李筌曰投之必死不令而得其用也杜牧曰此言兵在死地上下同志不待修整而自戒懼不待收索而自得心不待約令而自親信也孟氏曰不求其勝而勝自得也梅堯臣曰不修而兵自戒不索而情自得不約而衆自親不令而人自信皆所以陷於危難故三軍同心也王晳曰謂死難之地人心自然故也張預曰危難之地人自同力不修整而自戒愼不求索而得情意不約束而親上不號令而信命所謂同舟而濟則胡越何患乎異心也禁祥去疑至死無所之曹操曰禁妖祥之言去疑惑之計一本作至死無所災李筌曰妖祥之言疑惑之事而禁之故無所災杜牧曰黃石公曰禁巫祝不得爲吏士卜問軍之吉凶恐亂軍士之心言旣去疑惑之路則士卒至死無有異志也梅堯臣曰妖祥之事不作疑惑之言不入則軍必不亂死而後巳王晳曰災祥神異有以惑人故禁止之張預曰欲士死戰則禁止軍吏不得言妖祥之事恐惑衆也去疑惑之計則至死無他慮司馬法曰滅厲祥此之謂也儻士卒未有必戰之心則亦有假妖祥以使衆者田單守卽墨命一卒爲神毎出入約束必稱神遂破燕是也吾士無餘財非惡貨也無餘命非惡壽也曹操曰皆燒焚財物非惡貨之多也棄財致死者不得巳也杜牧曰若有財貨恐士卒顧戀有苟生之意無必死之心也梅堯臣曰不得巳竭財貨不得巳盡死戰王晳曰足用而巳士顧財富則媮生死戰而巳士顧生路則無死志矣張預曰貨與壽人之所愛也所以燒擲財寳割棄性命者非憎惡之也不得巳也令􅀤之日士卒坐者涕霑􅁭偃臥者涕交􅄨曹操曰皆持必死之計李筌曰棄財與命有必死之志故割而流涕也杜牧曰士皆以死爲約未戰之日先令曰今日之事在此一舉􅀂不用命身膏草野爲禽獸所食也梅堯臣曰決以死力牧􅀃是也王晳曰感勵之使然張預曰感激之故涕泣也未戰之日先令曰今日之事在此一舉若不用命身膏草野爲禽獸所食或曰凡行軍饗士使酒㧞劒起舞作朋角抵伐鼓呌呼所以增其氣若令涕泣無乃挫其壯心乎答曰先決其死力後激其銳氣則無不勝儻無必死之心其氣雖盛何由克之若荆軻於易水士皆垂淚涕泣及復爲羽聲忼慷則皆􅉂目髮上指冠是也投之無所往者諸劌之勇也李筌曰夫獸窮則搏鳥窮則啄令急迫則專諸曹劌之勇也杜牧曰言所投之處皆爲專諸曹劌之勇梅堯臣曰旣令以必死則所往皆有專諸曹劌之勇張預曰人懷必死則所向皆有專諸曹劌之勇也專諸吳公子光使刺殺吳王僚者劌當爲沬曹沬以勇力事魯莊公嘗執上首劫齊桓公故善用兵者譬如率然梅堯臣曰相應之容易也率然者常山之虵也擊其首則尾至擊其尾則首至擊其中則首尾俱至梅堯臣曰虵之爲物也不可擊擊之則率然相應張預曰率猶速也擊之則速然相應此喻陳法也八陳圖曰以後爲前以前爲後四頭八尾觸處爲首敵衝其中首尾俱救敢問兵可使如率然乎梅堯臣曰可使兵首尾率然相應如一體乎曰可夫吳人與越人相惡也當其同舟而濟遇風其相救也如左右手梅堯臣曰勢使之然張預曰吳越仇讎也同處危難則相救如兩手況非仇讎者豈不猶率然之相應乎是故方馬埋輪未足恃也曹操曰方􅅞馬也埋輪示不動也此言專難不如權巧故曰設方馬埋輪不足恃也李筌曰投兵無所往之地人自􅃲如虵之首尾故吳越之人同舟相救雖縛馬埋輪未足恃也杜牧曰縛馬使爲方陳埋輪使不動雖如此亦未足稱爲專固而足爲恃須任權變置士於必死之地使人自爲戰相救如兩手此乃守固必勝之道而足爲恃也陳皥曰人之相惡莫甚吳越同舟遇風而猶相救何則勢使之然也夫用兵之道􅀂陷在必戰之地使懷俱死之憂則首尾前後不得不相救也有吳越之惡猶如兩手相救況無吳越之惡乎蓋言貴於設變使之則勇怯之心一也梅堯臣同杜牧註王晳曰此謂在難地自相救耳虵之首尾人之左右手皆喻相救之敏也同舟而濟在險難也吳越猶無異心況三軍乎故其足恃甚於方馬埋輪曹公說是也張預曰上文歷言置兵於死地使人心專固然此未足爲善也雖置之危地亦須用權智使人令相救如左右手則勝矣故曰雖􅅞馬埋輪未足恃固以取勝所可必恃者要使士卒相應如一體也齊勇若一政之道也李筌曰齊勇者將之道杜牧曰齊正勇敢二軍如一此皆在於爲政者也陳皥曰政令嚴明則勇者不得獨進怯者不得獨退三軍之士如一也梅堯臣曰使人齊勇如一心而無怯者得軍政之道也王晳同梅堯臣註張預曰旣置之危地又使之相救則三軍之衆齊力同勇如一夫是軍政得其道也剛柔皆得地之理也曹操曰强弱一勢也李筌曰剛柔得者因地之勢也杜牧曰强弱之勢須因地形而制之也梅堯臣曰兵無强弱皆得用者是因地之勢也王晳曰剛柔猶强弱也言三軍之士强弱皆得其用者地利使之然也曹公曰强弱一勢是也張預曰得地利則柔弱之卒亦可以克敵況剛强之兵乎剛柔俱獲其用者地勢使之然也故善用兵者攜手􅀂使一人不得已也曹操曰齊一貌也李筌曰理衆如理寡也杜牧曰言使三軍之士如牽一夫之手不得已故順從我之命喻易也賈林曰攜手翻迭之貌便於回運以前爲後以後爲前以左爲右以右爲左故百萬之衆如一人也梅堯臣曰用三軍如攜手使一人者勢不得已自然皆從我所揮也王晳曰攜使左右前後率從我也張預曰三軍雖衆如提一人之手而使之言齊一也故曰將之所揮莫不從移將之所指莫不前死將軍之事靜以幽正以治曹操曰謂清凈幽􅀷平正杜牧曰清淨簡易幽􅀷難測平正無偏故能致治梅堯臣曰靜而幽䆳人不能測正而自治人不能撓王晳曰靜則不撓幽則不測正則不媮治則不亂張預曰其謀事則安靜而幽􅀷人不能測其御下則公正而整洽人不敢慢能愚士卒之耳目使之無知曹操曰愚誤也民可與樂成不可與慮始李筌曰爲謀未熟不欲令士卒知之可以樂成不可與謀始是以先愚其耳目使無見知杜牧曰言使軍士非將軍之令其他皆不知如聾如瞽也梅堯臣曰凡軍之權謀使由之而不使知之王晳曰杜其見聞何氏同杜牧註張預曰士卒懵然無所聞見但從命而已易其事革其謀使人無識李筌曰謀事或變而不識其原杜牧曰所爲之事有所之謀不使知其造意之端識其所緣之本也梅堯臣曰改其所行之事變其所爲之謀無使人能識也王晳曰巳行之事已施之謀當革易之不可再也何氏曰將術以不窮爲竒也張預曰前所行之事舊所􅀤之謀皆變易之使人不可知也􅀂裴行儉令軍士下營訖忽使移就崇岡初將吏皆不恱是夜風雨暴至前設營所水􅀷丈餘將士驚服因問曰何以知風雨也行儉笑曰自今但依吾節制何須問我所由知也易其居迂其途使人不得慮李筌曰行路之便衆人不得知其情杜牧曰易其居去安從危迂其途捨近卽遠士卒有必死之心陳皥曰將帥凡舉一事切委曲而致之無使人得計慮者賈林曰居我要害能使自移途近於我能使迂之􅀤機微路人不能知也梅堯臣曰更其所安之居迂其所趨之途無使人能慮也王晳曰處易者將致敵以求戰也迂途者示遠而宻襲也張預曰其居則去險而就易其途則捨近而從遠人初不曉其㫖及勝乃服太白山人曰兵貴詭道者非止詭敵也抑詭我士卒使由之而不使知之也帥與之期如登高而去其梯梅堯臣曰可進而不可退也帥與之􅀷入諸侯之地而發其機杜牧曰使無退心孟明焚舟是也一本帥與之登高陳皥曰􅀤其心機賈林曰動我機權隨事應變梅堯臣曰􅀤其危機使人盡命王晳曰皆勵決戰之志也機之􅀤無復廻也賈詡勸曹公曰必決其機是也張預曰去其梯可進而不可退􅀤其機可往而不可返項羽濟河沈舟之􅀋也焚舟破釡若驅羣羊驅而往驅而來莫知所之曹操曰一其心也李筌曰還師者皆焚舟梁堅其志旣不知謀又無返顧之心是以如驅羊也杜牧曰三軍但知進退之命不知攻取之端也梅堯臣曰但馴然從驅莫知其他也何氏曰士之往來唯將之令如羊之從牧者張預曰羣羊往來牧者之隨三軍進退惟將之揮聚三軍之衆投之於險此謂將軍之事也曹操曰險難也梅堯臣曰措三軍於險難而取勝者爲將之所務也張預曰去梯􅀤機置兵於危險以取勝者此將軍之所務也九地之變屈伸之利人情之理不可不察曹操曰人情見利而進見害而退杜牧曰言屈伸之利害人情之常理皆因九地以變化今欲下文重舉九地故於此重言發端張本也梅堯臣曰九地之變有可屈可伸之利人情之常理須審察之王晳曰明九地之利害亦當極其變耳言屈伸之利者未見便則屈見便則伸言人情之理者􅀷專淺散圍禦之謂也張預曰九地之法不可拘泥須識變通可屈則屈可伸則伸審所利而巳此乃人情之常理不可不察凡爲客之道􅀷則專淺則散梅堯臣曰􅀷則專固淺則散歸此而下重言九地者孫子勤勤於九變也張預曰先舉兵者爲客入􅀷則專固入淺則士散此而下言九地之變去國越境而師者絶地也梅堯臣曰進不及輕退不及散在二地之間也王晳曰此越鄰國之境也是謂􅀌絕之地當速決其事􅀂吳王伐齊近之如此者鮮故不同九地之例張預曰去巳國越人境而用師者危絶之地也若秦師過周而襲鄭是也此在九地之外而言之者戰國時間有之也四逹者衢地也梅堯臣曰馳道四出敵當一面張預曰敵當一面旁國四屬入􅀷者重地也梅堯臣曰士卒以軍爲家故心無散亂入淺者輕地也梅堯臣曰歸國尚近心不能專背固前隘者圍地也梅堯臣曰背􅀒險固前當阨塞張預曰前狹後險進退受制於人也無所徃者死地也梅堯臣曰窮無所之張預曰左右前後窮無所之地是故散地吾將一其志李筌曰一卒之心杜牧曰守則志一戰則易散梅堯臣曰保城備險一志堅守候其虚懈出而襲之張預曰集人聚榖一志固守依險設伏攻敵不意輕地吾將使之屬曹操李筌曰使相及屬杜牧曰部伍營壘宻近聮屬蓋以輕散之地一者備其逃逸二者恐其敵至使易相救杜佑曰使相仍也輕地還師當安道促行然令相屬續以備不虞也梅堯臣曰行則隊校相繼止則營壘聮屬脫有敵至不有散逸也王晳曰絶則人不相恃張預曰宻營促隊使相屬續以備不虞以防逃遁爭地吾將趨其後曹操曰利地在前當速進其後也李筌曰利地必爭益其備也此筌以趨字爲多字杜牧曰必爭之地我若巳後當疾趨而爭況其不後哉陳皥曰二說皆非也若敵據地利我後爭之不亦後據戰地而趨戰之勞乎所謂爭地必趨其後者若地利在前先分精銳以據之彼若恃衆來爭我以大衆趨其後無不尅者趙奢所以破秦軍也杜佑曰利地在前當進其後爭地先據者勝不得者負故從其後使相及也梅堯臣曰敵未至其地我若在後則當疾趨以爭之張預曰爭地貴速若前驅至而後不及則未可故當疾進其後使首尾俱至或曰趨其後謂後發先至也交地吾將謹其守杜牧曰嚴壁壘也梅堯臣曰謹守壁壘斷其通道王晳曰懼襲我也張預曰不當阻絶其路但嚴壁固守候其來則設伏擊之衢地吾將固其結杜牧曰結交諸候使之牢固梅堯臣曰結諸侯使之堅固勿令敵先王晢曰固以德禮威信且示以利害之計張預曰財幣以利之盟誓以要之堅固不渝則必爲我􅂇重地吾將繼其食曹操曰掠彼也李筌曰館穀於敵也繼一作掠賈林曰使糧相繼而不絶也杜佑曰􅀷入當繼其糧餉梅堯臣曰道旣遐絶不可歸國取糧當掠彼以食軍張預曰兵在重地轉輸不通不可乏糧當掠彼以續食圯地吾將進其塗曹操曰疾過去也李筌曰不可留也杜佑曰疾行無舍此地梅堯臣曰無所依當速過張預曰遇圯塗之地宜引兵速過圍地吾將塞其闕曹操李筌曰以一士心也杜牧曰兵法圍師必闕示以生路令無死志因而擊之今􅀂我在圍地敵開生路以誘我卒我返自塞之令士卒有必死之心後魏末齊神武起義兵於河北爲爾朱兆天光度律仲遠等四將㑹於鄴南士馬精强號二十萬圍神武於南陵山時神武馬二千歩軍不滿三萬兆等設圍不合神武連繫牛驢自塞之於是將士死戰四面奮擊大破兆等四將也孟氏曰意欲突圍示以守固杜佑曰塞其闕不欲走之意梅堯臣曰自塞其旁道使士卒必死戰也王晢曰懼人有走心張預曰吾在敵圍敵開生路當自塞之以一士心齊神武擊牛馬以塞路而士卒死戰是也死地吾將示之以不活曹操李筌曰勵志也杜牧曰示之必死令其自奮以求生也賈林曰禁財棄糧塞井破竈示必死也杜佑曰勵士也焚輜重棄糧食塞井夷竈示無生意必殊死戰也梅堯臣曰必死可生人盡力也王晳同梅堯臣註何氏同杜牧註張預曰焚輜重棄糧食塞井夷竈示以無活勵之使死戰也故兵之情圍則禦曹操曰相持禦也李筌曰敵圍我則禦之杜牧曰言兵在圍地始乃人人有禦敵持勝之心相禦持也窮則同心守禦梅堯臣同杜牧註張預曰在圍則自然持禦不得巳則􅃲曹操曰勢有不得巳也李筌曰有不得巳則戰梅堯臣曰勢無所往必􅃲王晳曰脫死難者唯􅃲而巳張預曰勢不可巳須悉力而􅃲過則從曹操曰陷之甚過則從計也李筌曰過則審躡又云陷之於過則謀從之孟氏曰甚陷則無所不從梅堯臣同孟氏註張預曰􅀷陷於危難之地則無不從計􅀂班超在鄯善欲與麾下數十人殺虜使乃諄諭之其士卒曰今在危亡之地死生從司馬是也是故不知諸侯之謀者不能預交不知山林險阻沮澤之形者不能行軍不用鄕導者不能得地利曹操曰上巳陳此三事而復云者力惡不能用兵故復言之李筌曰三事軍之要也梅堯臣曰巳解軍爭篇中重陳此三者蓋言敵之情狀地之利害當預知焉王晳曰再陳者勤戒之也張預曰知此三事然後能審九地之利害故再陳於此也四五者不知一非覇王之兵也曹操曰謂九地之利害或曰上四五事也張預曰四五謂九地之利害有一不知未能全勝夫覇王之兵伐大國則其衆不得聚威加於敵則其交不得合李筌曰夫幷兵震威則諸侯自顧不敢預交杜牧曰權力有餘也能分散敵也孟氏曰以義制人人誰敢拒陳皥曰雖有覇王之勢伐大國則我衆不得聚要在結交外援􅀂不如此但以威加於敵逞巳之强則必敗也梅堯臣曰伐大國能分其衆則權力有餘也權力有餘則威加敵威加敵則旁國懼旁國懼則敵交不得合也王晳曰能知敵謀能得地利又能形之使其不相救不相恃則雖大國豈能聚衆而拒我哉威之所加者大則敵交不得合張預曰恃富强之勢而亟伐大國則巳之民衆將怨苦而不得聚也甲兵之威倍勝於敵國則諸侯懼而不敢與我合交也或曰侵伐大國􅀂大國一敗則小國離而不聚矣􅀂晉楚爭鄭晉勝則鄭附晉敗則鄭叛也小國旣離則敵國之權力分而弱矣或我之兵威得以增勝於彼是則諸侯豈敢與敵人交合乎是故不爭天下之交不養天下之權信音伸巳之私威加於敵故其城可㧞其國可隳曹操曰覇者不結成天下諸侯之權也絶天下之交奪天下之權故巳威得伸而自私李筌曰能絶天下之交惟得伸巳之私志威而無外交者杜牧曰信伸也言不結鄰援不蓄養機權之計但逞兵威加於敵國貴伸己之私欲􅀂此者則其城可㧞其國可隳齊桓公問於管仲曰必先頓甲兵修文德正封疆而親四鄰則可矣於是復魯衞燕所侵地而以好成四鄰大親乃南伐楚北伐山戎東制令攴折􅀌竹西服流沙兵車之㑹六乗車之㑹三乃率諸侯而朝天子吳夫差破越於會稽敗齊於艾陵闕溝於啇魯㑹晉於黃池爭長而反威加諸侯諸侯不敢與爭句踐伐之乞師齊楚齊楚不應民疲兵頓爲越所㓕越王句踐間戰於申包胥曰越國南則楚西則晉北則齊春秋皮幣玉帛子女以賔服焉未嘗敢絶求以報吳願以此戰包胥曰善哉蔑以加焉遂伐吳滅之賈林曰諸侯旣懼不得附聚不敢合從我之智謀威力有餘諸侯自歸何用養交之也不養一作不事陳皥曰智力旣全威權在我但自養士卒爲不可勝之謀天下諸侯無權可士也仁智義謀巳之私有用以濟衆故曰伸私威振天下德光四海恩沾品物信及豚魚百姓歸心無思不服故攻城必㧞伐國必隳也梅堯臣曰敵旣不得與諸侯合交則我亦不爭其交不養其權用巳力而已爾威亦增勝於敵矣故可㧞其城可隳其國此謂覇王之兵也王晳曰結交養權則天下可從申􅀻損威則國城不保張預曰不爭交援則􅀔􅀌而􅂇寡不養權力則人離而國弱伸一已之􅀻忿暴兵威於敵國則終取敗亡也或曰敵國衆旣不得聚交又不得合則我當絶其交奪其權得伸巳所欲而威倍於敵國故人城可得而㧞人國可得而隳之施無法之賞懸無政之令賈林曰欲㧞城隳國之時故懸國外之賞罰行政外之威令故不守常法常政故曰無法無政梅堯臣曰瞻功行賞法不預設臨敵作誓政不先懸王晳曰杜姦隃也曹公曰軍法令不預施懸之司馬法曰見敵作誓瞻功行賞此之謂也張預曰法不先施政不預告皆臨事立制以勵士心司馬法曰見敵作誓瞻功行賞犯三軍之衆若使一人曹操曰犯用也言明賞罰雖用衆若使一人也李筌曰善用兵者爲法作攻而人不知懸事無令而人從之是以犯衆如一人也梅堯臣曰犯用也賞犯嚴明用多若用寡也張預曰賞功不逾時罰罪不遷列賞罰之典旣明且速則用衆如寡也犯之以事勿告以言梅堯臣曰但用以戰不告以謀王晳曰情泄則謀乖張預曰任用之於戰􅃲勿諭之以權謀人知謀則疑也若裴行儉不告士卒以徙營之由是也犯之以利勿告以害曹操曰勿使知害李筌曰犯用也卒知言與害則生疑難梅堯臣曰用令知利不令知害王晳曰慮疑懼也張預曰人情見利則進知害則避故勿告以害也投之亡地然後存䧟之死地然後生曹操曰必殊死戰在亡地無敗者孫臏曰兵恐不投之死地也李筌曰兵居死地必決命而闘以求生韓信水上軍則其義也梅堯臣曰地雖曰亡力戰不亡地雖曰死死戰不死故亡者存之基死者生之本也何氏曰如漢王遣將韓信擊趙未至井陘口三十里止舎夜半傳發選輕騎二千人人持一赤幟從間道􅒝山而觀趙軍誡曰趙見我走必空壁逐我汝疾入趙壁㧞趙幟立漢幟令其禆將傳餐曰今日破趙㑹食信乃使萬人先行出背水陳趙軍遥見而大􅀏平旦信建大將軍之旗鼓行出井陘口趙開壁擊之大戰良乆於是信走水上軍趙空壁逐信信巳入水上軍軍皆殊死戰不可敗信所出奇兵二千騎馳入趙壁皆㧞趙幟立漢赤幟趙軍攻信旣不得還壁見漢幟大驚遂亂遁走於是漢兵夾擊大破虜趙軍斬陳餘泜水上擒趙王諸將因問信曰兵法右背山陵前左水澤今者將軍令臣等反背水陳曰破趙會食臣等不服然竟以勝此何術也信曰此在兵法顧諸君不察耳兵法不曰陷之死地而後生置之亡地而後存乎且信非得素推循士大夫也此所謂驅市人而戰其􅀔非置之死地使人人自爲戰今與之生地皆走寧尚可得而用之乎諸將皆服曰非所及也梁將陳慶之守渦陽城與後魏軍相持自春至冬數十百戰師老氣衰魏之援兵復欲築壘於軍後諸將恐腹背受敵議退師慶之曰共來至此渉歷一歲麋費糧㐲其數極多諸軍竝無闘心皆謀退縮豈是欲立功名直聚爲鈔暴耳蓋聞置兵死地乃可求生須虜大合然後與戰必捷諸將壯其計從之魏人掎角作十三城慶之銜枚夜出陷其四壘所餘九城兵甲猶盛乃陳其俘馘鼓噪而攻遂大奔潰斬獲略盡後魏末齊神武興義兵於河北時爾朱兆等四將兵馬號二十萬夾洹水而軍時神武士馬不滿三萬以衆寡不敵遂於韓陵山爲圓陳繫牛驢以塞道於是將士皆死戰四面奮擊大破之齊神武兵少天光等兵十倍圍而缺之神武乃自塞其缺士皆有必死之志是以破敵也高齊北豫州刺史司馬消難請降後周周將楊忠與柱國逹奚武援之於是共率騎士五千人各乗馬一匹從間道馳入齊境五百里前後遣三使報消難而皆不反命去豫州三十里武疑有變欲還忠曰有進死無退生獨以千騎夜趣城下四面峭絶徒聞擊柝之聲武親來麾數百騎以西忠勒餘騎不動候門開而入乃馳遣召武時齊鎮城將伏敬逺勒甲士二千人據東陴舉烽嚴警武憚之不欲保城乃多取財帛以消難及其屬先歸忠以三千騎爲殿到洛南皆解鞍而卧齊衆來追至於洛北忠謂將士曰但飽食今在死地賊必不敢渡水以當吾鋒食畢齊兵佯若渡水忠馳將擊之齊兵不敢逼遂徐引而退張預曰置之死亡之地則人自爲戰乃可存活也項將救趙破釡焚廬示以必死諸侯從壁上觀楚戰士無不一當十遂虜秦將是也夫衆䧟於害然後能爲勝敗梅堯臣曰未䧟難地則士卒心不專旣䧟危難然後勝敗在人爲之爾張預曰士卒用命則勝敗之事在我所爲故爲兵之事在於順詳敵之意曹操曰佯愚也或曰彼欲進設伏而退欲去開而擊之李筌曰敵欲攻我以守待之敵欲戰我以奇待之退伏利誘皆順其所欲杜牧曰夫順敵之意蓋言我欲擊敵未見其隙則藏形閉跡敵人之所爲順之勿驚假如强以陵我我則示怯而伏且順其强以驕其意候其懈怠而攻之假如欲退而歸則開圍使去以順其退使無闘心遂曰因而擊之皆順敵之㫖也陳皥曰順敵之㫖不假多􅀃但强示之弱進示之退使敵心不戒然後攻而破之必矣梅堯臣曰佯怯佯弱佯亂佯北敵人輕來我志乃得張預曰彼欲進則誘之令進彼欲退則緩之令退奉順其㫖設奇伏以取之或曰敵有所欲當順其意以驕之留爲後圖若東胡遣使謂冒頓曰欲得頭曼千里馬冒頓與之復遣使來曰願得單于一閼氏冒頓又與之及其驕怠而擊之遂滅東胡是幷敵一向千里殺將曹操曰幷兵向敵雖千里能擒其將也杜牧曰上文言爲兵之事在順敵人之意此乃未見敵人之隙耳若已見其􅂩有可攻之􅀔則須幷兵專力以向敵人雖千里之逺亦可以殺其將也賈林曰能以利誘敵人使一向趨之則我雖逺千里亦可擒殺其將梅堯臣曰隨敵一向然後發伏出奇則能逺擒其將王晳曰順敵意隨敵形及其空虚不虞幷兵一力以向之乗􅀔可千里而覆軍殺將也張預曰敵旣驕惰則幷兵力以向之可以覆其軍殺其將則明如冒頓烕東胡之事是也此謂巧能成事者也曹操曰是成事巧者也一作是謂巧攻成事梅堯臣曰能順敵而取勝機巧者也何氏曰能如此者是巧攻之成事也張預曰始順其意後殺其將成事之巧也是故政舉之日夷􅀜折符無通其使曹操曰謀定則閉􅀜以絶其符信勿通其使李筌曰政令旣行閉􅀜折符無得有所沮議恐惑衆士心也杜牧曰其所不通豈敵人之使乎若敵人之使不受則何必夷􅀜折符然後爲不通乎答曰夷􅀜折符者不令國人出入蓋恐敵人有間使潜來或藏形隱跡由危歷險或竊符盜信假託姓名而來窺我也無通其使者敵人若有使來聘亦不可受之恐有智能之士如張孟談婁敬之屬見其微而知著測我虚實也此乃兵形未成恐敵人先事以制我也兵形巳成出境之後則使在其間古之道也梅堯臣曰夷滅也折斷也舉政之日滅塞􅀜梁斷毀符節使不通也使不通者恐泄我事也張預曰廟筭已定軍謀巳成則夷塞􅀜梁毀折符信勿通使命恐泄我事也彼有使來則當納之故下文云敵之開闔必亟入之厲於廊廟之上以誅其事曹操曰誅治也杜牧曰厲揣厲也言廊廟之上誅治其事成敗先定然後興師一本作以謀其事梅堯臣曰嚴整於廊廟之上以計其事言其察也何氏曰磨厲廟勝之䇿以責成其事張預曰兵者大事不可輕議當􅅥厲於廟堂之上宻治其事貴謀不外泄也敵人開闔必亟入之曹操曰敵有間􅂩當急入之也李筌曰敵開闔未定必急來也孟氏曰開闔間者也有間來則疾内之梅堯臣同孟氏註張預曰開闔間謂使也敵有間來當急受之或曰謂敵人或開或闔出入無常進退未決則宜乗之先其所愛曹操曰據利便也李筌曰先攻其積聚及妻子利不擇其用也杜牧曰凡是敵人所愛惜倚恃以爲軍者則先奪之也梅堯臣曰先察其便利愛惜之所也何氏同杜牧註微與之期曹操曰後人發先人至杜牧曰微者潜也言以敵人所愛利便之處爲期將欲謀奪之故潜往赴期不令敵人知也陳皥曰我􅀂先奪便地而敵不至雖有其利亦奚用之是以欲取其愛惜之處必先微與敵人相期誤之使必至梅堯臣曰微露之期使間歸告然後我後人發先人至也後發者欲其必赴也先至者奪其所愛也王晳曰權譎也微者所以示宻曹公曰先敵至也張預曰兵所愛者便利之地我欲先據當微露其意與之相期敵方趨之我乃後發而先至也所以使敵先趨者恐我至而敵不來也故曰爭地吾將趨其後踐墨隨敵以決戰事曹操曰行踐規矩無常也李筌曰墨者出道也出遲道而從之恐不及杜牧曰墨規矩也言我常須踐履規矩􅀷守法制隨敵人之形若有可乗之􅀔則出而決戰也陳皥曰兵雖要在迅速以決戰事然自始及末須守法制縱獲勝捷亦不可爭競擾亂也城濮之戰晉文公登有莘之墟以望其師曰少長有禮其可用也踐墨一作剗墨賈林曰剗除也墨繩墨也隨敵計以決戰事惟勝是利不可守以繩墨而爲梅堯臣曰舉動必踐法度而隨敵屈伸因利以決戰也王晳曰踐兵法如繩墨然後可以順敵決勝張預曰循守法度踐履規矩隨敵變化形􅀔無常乃可以決戰取勝墨繩墨也婦人左右前後跪起皆中規矩繩墨是也是故始如處女敵人開戸後如脫兔敵不及拒曹操李筌曰處女示弱脫兔往疾也杜牧曰言敵人初時謂我無所能爲如處女之弱我因急去攻之險迅疾速如兔之脫走不可捍拒也或曰我避敵走如脫兔曰非也梅堯臣曰始􅀂處女踐規矩之謂也後若脫兔應敵決戰之速也王晳曰處女隨敵也開戸不虞也脫兔疾也若田單守卽墨而破燕軍是也張預曰守則如處女之弱令敵懈怠是以啓隙攻則猶脫兔之疾乗敵倉卒是以莫禦太史公謂田單守卽墨攻騎劫正如此語不其然乎孫子集註卷之十一
