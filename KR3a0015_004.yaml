front:
  text: 孫子集註卷之四
  hash: sha256:d21518f330b510b53686cb13a1d947b0c5e82985a204762a7495ab7ba3b35e35
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0015_SBCK_004-1a}
body:
  text: 形篇曹操曰軍之形也我動彼應兩敵相察情也李筌曰形謂主客攻守八陳五營隂陽向背之形杜牧曰因形見情無形者情宻有形者情踈宻則勝踈則敗也王晳曰形者定形也謂兩敵强弱有定形也善用兵者能變化其形因敵以制勝張預曰兩軍攻守之形也隱於中則人不可得而知見於外則敵乗隙而至形因攻守而顯故次謀攻孫子曰昔之善戰者先爲不可勝張預曰所謂知巳者也以待敵之可勝梅堯臣曰藏形内治伺其虚懈張預曰所謂知彼者也不可勝在巳可勝在敵曹操曰自修理以待敵之虚懈也李筌曰夫善用兵者守則深壁多具軍食善其敎練攻其城則尚撞棚雲梯土山地道陳則在山川丘陵背孤向虚從疑擊間善戰者掎角勢連首尾相應者爲不可勝也夫善戰者能爲不可勝不能使敵之必可勝故曰勝可知而不可爲不可勝者守也可勝者攻也此數者以爲可勝也杜牧曰自整軍事長有待敵之備閉跡藏形使敵人不能測度因伺敵人有可乗之便然後出而攻之杜佑曰先咨之廟堂慮其危難然後高壘深溝使兵練習以此守備之故待敵之闕則可勝之言制敵在外故自修理以候敵之虚懈巳見敵有闕漏之形然後可勝王晳曰不可勝者修道保法也可勝者有所隙耳張預曰守之故在巳攻之故在彼故善戰者能爲不可勝杜牧曰不可勝者上文註解所謂修整軍事閉形藏跡是也此事在己故曰能爲張預曰藏形晦跡居常嚴備則巳能焉不能使敵之可勝杜牧曰敵若無形可窺無虚懈可乘則我雖操可勝之具亦安能取勝敵乎賈林曰敵有智謀深爲己備不能强今不巳備杜佑曰在巳故練兵士䇿與道合深爲備者亦不可强勝之梅堯臣曰在己故能爲在敵故無必王晳曰在敵不在我也張預曰若敵强弱之形不顯於外則我豈能必勝於彼故曰勝可知曹操曰見成形也杜牧曰知者但能知己之力可以勝敵也陳皥曰取勝於形勝可知也而不可爲曹操曰敵有備故也杜牧曰言我不能使敵人虚懈爲我可勝之資賈林曰敵若隱而無形不可强爲勝敗杜佑曰敵有備也巳料敵見敵形者則勝負可知若敵宻而無形亦不可强使爲敗故范蠡曰時不至不可强生事不究不可强成梅堯臣曰敵有闕則可知敵無闕則不可爲何氏曰可知之勝在我我有備也不可爲之勝在敵敵無形也張預曰己有備則勝可知敵有備則不可爲不可勝者守也曹操曰藏形也杜牧曰言未見敵人有可勝之形巳則藏形爲不可勝之備以自守也杜佑曰藏形也若未見其形彼衆我寡則自守也梅堯臣曰且有待也何氏曰未見敵人形勢虚實有可勝之理則宜固守張預曰知巳未可以勝則守其氣而待之可勝者攻也曹操曰敵攻巳乃可勝李筌曰夫善用兵者守則高壘堅壁也攻其橦棚雲梯土山地道陳左川澤右丘陵背孤向虚從疑擊間識辨五令以節衆勢連首尾相應者爲不可勝也無此數者以爲可勝也杜牧曰敵人有可勝之形則當出而攻之杜佑曰敵攻己乃可勝也巳見其形彼寡我衆則可攻梅堯臣曰見其闕也王晳曰守者以於勝不足攻者以於勝有餘張預曰知彼有可勝之理則攻其心而取之守則不足攻則有餘曹操曰吾所以守者力不足也所以攻者力有餘也李筌曰力不足者可以守力有餘者可以攻也梅堯臣曰守則知力不足攻則知力有餘張預曰吾所以守者謂取勝之道有所不足故且待之吾所以攻者謂勝敵之事巳有其餘故出擊之言非百勝不戰非萬全不闘也後人謂不足爲弱有餘爲强者非也善守者藏於九地之下善攻者動於九天之上故能自保而全勝也曹操曰因山川丘陵之固者藏於九地之下因天時之變者動於九天之上李筌曰天一遁甲經云九天之上可以陳兵九地之下可以伏藏常以直符加時干後一所臨宫爲九天後二所臨宫爲九地地者靜而利藏天者運而利動故魏武不明二遁以九地爲山川九天爲天時也夫以天一太一之遁幽微知而用之故全也經云知三避五魁然獨處能知三五橫行天下以此法出不拘諸咎則其義也杜牧曰守者韜聲滅跡幽比鬼神在於地下不可得而見之攻者勢迅聲烈疾若雷電如來天上不可得而備也九者高深數之極陳皥曰春三月寅功曹爲九天之上申傳送爲九地之下夏三月午勝先爲九天之上子神后爲九地之下秋三月申傳送爲九天之上寅功曹爲九地之下冬三月子神后爲九天之上午勝先爲九地之下也杜佑曰善守備者務因其山川之阻丘陵之固使不知所攻言其深宻藏於九地之下善攻者務因天時地利水火之變使敵不知所備言其雷震發動若於九天之上也梅堯臣曰九地言深不可知九天言高不可測蓋守備宻而攻取迅也王晳曰守者爲未見可攻之利當潜藏其形沉靜幽黙不使敵人窺測之也攻者爲見可攻之利當高逺神速乗其不意懼敵人覺我而爲之備也九者極言之耳何氏曰九地九天言其深微尉繚子曰治兵者若祕於地若邃於天言其祕宻邃逺之甚也後漢涼州賊王國圍陳倉左將軍皇甫嵩督前軍董卓救之卓欲速進赴陳倉嵩不聽卓曰智者不後時勇者不留決速救則城全不救則城滅全滅之勢在於此也嵩曰不然百戰百勝不如不戰而屈人之兵是以先爲不可勝以待敵之可勝不可勝在我可勝在彼彼守不足我攻有餘有餘者動於九天之上不足者䧟於九地之下今陳倉雖小城守固備非九地之䧟也王國雖强而攻我之所不救非九天之勢也夫勢非九天攻者受害䧟非九地守者不㧞國今巳䧟受害之地而陳倉保不拔之城我可不煩兵動衆而取全勝之功將何救焉遂不聽王國圍陳倉自冬迄春八十餘日城堅守固竟不能拔賊衆疲弊果自解去張預曰藏於九地之下喻幽而不可知也動於九天之上喻來而不可備也尉繚子曰若祕於地若邃於天是也守則固是自保也攻則取是全勝也見勝不過衆人之所知非善之善者也曹操曰當見未萌李筌曰知不出衆知非善也韓信破趙未餐而出井陘曰破趙會食時諸將嘸然佯應曰諾乃背水陳趙乗壁望見皆大笑言漢將不便兵也乃破趙食斬成安君此則衆所不知也杜牧曰衆人之所見破軍殺將然後知勝我之所見廟堂之上蹲爼之間已知勝負者矣賈林曰守必固攻必克能自保全而常不失勝見未然之勝善知將然之敗謂實微妙通玄非衆人之所見也孟氏曰當見未萌言兩軍巳交雖料見勝負䇿不能過絶於人但見近形非逺太公曰智與衆同非國師也梅堯臣曰人所見而見故非善王晳曰衆常之人見所以勝而不知制勝之形張預曰衆人所知已成已箸也我之所見未形未萌也戰勝而天下曰善非善之善者也曹操曰爭鋒也李筌曰爭鋒力戰天下易見故非善也杜牧曰天下猶上文言衆也言天下人皆稱戰勝者故破軍殺將者也我之善者隂謀潜運攻必伐謀勝敵之日曾不血刃陳皥曰潜運其智專伐其謀未戰而屈人之兵乃是善之善者也梅堯臣曰見不過衆戰雖勝天下稱之猶不曰善王晳曰以謀屈人則善矣張預曰戰而後能勝衆人稱之曰善是有智名勇功也故云非善若見微察隱取勝於無形則眞善者也故舉秋毫不爲多力見日月不爲明目聞雷霆不爲聰耳曹操曰易見聞也李筌曰易見聞也以爲攻戰勝而天下不曰善也夫智能之將人所莫測爲之深謀故孫武曰難知如隂也王晳曰衆人之所知不爲智力戰而勝人不爲善何氏曰此言衆人之所見所聞不足爲興也昔烏獲舉千鈞之鼎爲力離朱百歩覩纎芥之物爲明師曠聽蚊行螘歩爲聰也兵之成形而見之誰不能也故勝於未形乃爲知兵矣張預曰人皆能也引此以喻衆人之見勝也秋毫謂兎毛至秋而勁細言至輕也古之所謂善戰者勝於易勝者也曹操曰原微易勝攻其可勝不攻其不可勝也杜牧曰敵人之謀初有萌兆我則潜運以能攻之用力旣少制勝旣微故曰易勝也梅堯臣曰力舉秋毫明見日月聰聞雷霆不出衆人之所能也故見於著則勝於艱見於微則勝於易何氏曰言敵人之謀初有萌兆我則潜運巳能攻之用力旣少制敵甚微故曰易勝也張預曰交鋒接刃而後能制敵者是其勝難也見微察隱而破於未形者是其勝易也故善戰者常攻其易勝而不攻其難勝也故善戰者之勝也無智名無勇功曹操曰敵兵形未成勝之無赫赫之功也李筌曰勝敵而天下不知何智名之有杜牧曰勝於未萌天下不知故無智名曾不血刃敵國巳服故無勇功也梅堯臣曰大智不彰大功不揚見微勝易何勇何智何氏曰患銷未形人誰稱智不戰而服人誰言勇漢之子房唐之裴度能之張預曰隂謀潜運取勝於無形天下不聞料敵制勝之智不見搴旗斬將之功若留侯未甞有戰闘功是也故其戰勝不􅑯李筌曰百戰百勝有何疑貳也此筌以忒字爲貳也陳皥曰籌不虚運䇿不徒發張預曰力戰而求勝雖善者亦有敗時旣見於未形察於未成則百戰百勝而無一差忒矣不忒者其所措必勝勝巳敗者也曹操曰察敵必可敗不差忒也李筌曰置勝於巳敗之師何忒焉師老卒惰法令不一謂巳敗也杜牧曰措猶置也忒差忒也我能置勝不忒者何也蓋先見敵人巳敗之形然後攻之故能致必勝之功不差忒也賈林曰讀措爲錯錯雜也取敵之勝理非一途故雜而料之也常於勝未形巳見敵之敗梅堯臣曰睹其可敗勝則不差何氏曰善料也張預曰所以能勝而不差者蓋察知敵人有必可敗之形然後指兵以能之云耳故善戰者立於不敗之地而不失敵之敗也李筌曰兵得地者昌失地者亡地者要害之地秦軍敗趙先據北山者勝宋師伐燕過大峴而勝皆得其地也杜牧曰不敗之地者爲不可勝之計使敵人必不能敗我也不失敵人之敗者言窺伺敵人可敗之形不失毫髮也陳皥註同李筌杜佑註同杜牧梅堯臣曰善候敵隙我則常勝王晳曰常爲不可勝待敵可勝不失其機何氏曰自恃有備則無患常伺敵隙則勝之不失也立於不敗之地利也言我常爲勝所張預曰審吾法令明吾賞罰便吾器用養吾武勇是立於不敗之地也我有節制則彼將自衂是不失敵之敗也是故勝兵先勝而後求戰敗兵先戰而後求勝曹操曰有謀與無慮也李筌曰計與不計也是以薛公知黥布之必敗田豐知魏武之必勝是其義也杜牧曰管子曰天時地利其數多少其要必出於計數故凡攻伐之道計必先定於内然後兵出乎境不明敵人之政不能加也不明敵人之積不能約也不明敵人之將不見先軍不眀敵人之士不見先陳故以衆擊寡以理擊亂以富撃貧以能擊不能以敎士練卒擊歐衆白徒故能百戰百勝此則先勝而後求戰之義也衞公李靖曰夫將之上務在於明察而衆和謀深而慮逺審於天時稽乎人理若不料其能不逹權變及臨機對敵方始趦趄左顧右盻計無所出信任過說一彼一此進退狐疑部伍狼籍何異趣蒼生而赴湯火驅牛羊而㗖狼虎者乎此則先戰而後求勝之義也賈林曰不知彼我之情陳兵輕進意雖求勝而終自敗也梅堯臣曰可勝而戰戰則勝矣未見可戰勝可得乎何氏曰凡用兵先定必勝之計而後出軍若不先謀而欲恃强勝未必也張預曰計謀先勝然後興師故以戰則克尉繚子曰兵不必勝不可以言戰攻不必拔不可以言攻謂危事不可輕舉也又曰兵貴先勝於此則勝彼矣弗勝於此則弗勝彼矣此之謂也若趙充國常先計而後戰亦是也不謀而進欲幸其成功故以戰則敗善用兵者修道而保法故能爲勝敗之政曹操曰善用兵者先自修治爲不可勝之道保法度不失敵之敗亂也李筌曰以順討逆不伐無罪之國軍至無虜掠不伐樹木汚井竈所過山川城社陵祠必滌而除之不習亡國之事謂之道法也軍嚴肅有死無犯賞罰信義將若此者能勝敵之敗政也杜牧曰道者仁義也法者法制也善用兵者先修理仁義保守法制自爲不可勝之政伺敵有可敗之隙則攻能勝之賈林曰常修用兵之勝道保賞罰之法度如此則當爲勝不能則敗故曰勝敗之政也梅堯臣曰攻守自修法令自保在我而已王晳曰法者下之五事也張預曰修治爲戰之道保守制敵之法故能必勝或曰先修飾道義以和其衆後保守法令以戢其下使民愛而畏之然後能爲勝敗兵法一曰度賈林曰度土地也王晳曰丈尺也二曰量賈林曰量人力多少倉廩虚實王晳曰㪷斛也三曰數賈林曰筭數也以數推之則衆寡可知虚實可見王晳曰百千也四曰稱賈林曰旣知衆寡兼知彼我之德業輕重才能之長短王晳曰權衡也五曰勝曹操曰勝敗之政用兵之法當以此五事稱量知敵之情張預曰此言安營布陳之法也李衞公曰敎士猶布碁於盤若無畫路碁安用之地生度曹操曰因地形勢而度之李筌曰旣度有情則量敵而禦之杜牧曰度者計也言度我國土大小人戸多少征賦所入兵車所籍山河險易道里迂直自度此事與敵人如何然後起兵夫小不能謀大弱不能擊强近不能襲逺夷不能攻險此皆生於地故先度也梅堯臣曰因地以度軍勢王晳曰地人所履也舉兵攻戰先本於地由地故生度度所以度長短知逺近也凡行軍臨敵先須知逺近之計何氏曰地者逺近險易也度計也未出軍先計敵國之險易道路迂直兵甲孰多勇怯孰是計度可伐然後與師動衆可以成功度生量杜牧曰量者酌量也言度地已熟然後能酌量彼我之强弱也梅堯臣曰因度地以量敵情王晳曰謂量有大小言旣知逺近之計則須更量其地之大小也何氏曰量酌彼巳之形勢量生數曹操曰知其逺近廣狹知其人數也李筌曰量敵逺近强弱須備士卒軍資之數而勝也杜牧曰數者機數也言强弱已定然後能用機變數也賈林曰量地逺近廣狹則知敵人人數多少也梅堯臣曰因量以得衆寡之數王晳曰數所以紀多少言旣知敵之大小則更計其精劣多少之數曹公曰知其人數何氏曰數機變也先酌量彼我强弱利害然後爲機數張預曰地有逺近廣狹之形必先度知之然後量其容人多少之數也數生稱曹操曰稱量敵孰愈也李筌曰分數旣定賢智之多少得賢者重失賢者輕如韓信之論楚漢也須知輕重别賢愚而稱之錙銖則强杜牧曰稱校也機權之數巳行然後可以稱校彼我之勝負也梅堯臣曰因數以權輕重王晳曰稱所以知重輕喻强弱之形勢也能盡知逺近之計大小之舉多少之數以與敵相形則知重輕所在何氏同杜牧註稱生勝曹操曰稱量之數知其勝負所在李筌曰稱知輕重勝敗之數可知也杜牧曰稱校旣熟我勝敵敗分明見也梅堯臣曰因輕重以知勝負王晳曰重勝輕也陳皥杜佑李筌同杜牧上五事註何氏曰上五事未戰先計必勝之法故孫子引古法以䟽勝敗之要也張預曰稱宜也地形與人數相稱則踈宻得宜故可勝也尉繚子曰無過在於度數度謂尺寸數謂什伍度以量地數以量兵地與兵相稱則勝五者皆因地形而得故自地而生之也李靖五陳隨地形而變是也故勝兵若以鎰稱銖梅堯臣曰力易舉也敗兵若以銖稱鎰曹操曰輕不能舉重也李筌曰二十兩爲鎰銖之於鎰輕重異位勝敗之數亦復如之梅堯臣曰力難制也王晳曰言銖鎰者以明輕重之至也張預曰二十兩爲鎰二十四銖爲兩此言有制之兵對無制之兵輕重不侔也勝者之戰民也若決積水於千仞之谿者形也曹操曰八尺曰仞決水千仞其高勢疾也李筌曰八尺曰仞言其勢也杜預伐吳言兵如破竹數節之後皆迎刃自解則其義也杜牧曰夫積水在千仞之谿不可測量如我之守不見形也及決水下湍泳永旱奔注如我之攻不可禦也梅堯臣曰水決千仞之谿莫測其迅兵動九天之上莫見其跡此軍之形也王晳曰千仞之谿至陗絶也喻不可勝對可勝之形乗機攻之決水是也張預曰水之性避高而趨下決之赴深谿固湍浚而莫之禦也兵之形象水乗敵之不備掩敵之不意避實而擊虚亦莫之制也或曰千仞之谿謂不測之淵人莫能量其淺深及決而下之則其勢莫之能禦如善守者匿形晦跡藏於九地之下敵莫能測其强弱及乗虚而出則其鋒莫之能當也孫子集註卷之四
