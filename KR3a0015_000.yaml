  text: 孫子集注序
  hash: sha256:3f4cf824d9bd44b16545c5b54cee2b5564c6a8f1e13808cd3de630deffac756f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3a0015_SBCK_000-1a}
body:
  text: 歐陽文忠公撰四庫書目言孫子注二十餘家豫所見僅此漢有曺操唐有杜牧李筌陳皥孟氏賈林杜佑宋有張預梅堯臣王晢何氏諸家多托之空言而曺操則見之行事者也操嘗為新書諸將征伐即以新書授之㴀者勝違者負今新書不傳而見于李肅公問答者機權應變實夲之孫子其注多隱辭引而不彂操之所以如鬼也杜牧自序云孫武死後凡千歲將兵者有成有敗勘其事迹皆與武所著書一一相拞當猶印圈模刻一不差跌豫解猶盤中赱丸橫斜曲直計于􅎔時不可盡知其必可知者知丸之不能出于盤也牧未嘗用兵觀其與時宰論兵二書謂尚古兵柄本出儒術援古證今若繩裁刀解使其言用山東不足平矣陳皥注多指謪杜之謬誤人各有見未必為樊川病也李筌注依太乙遁甲雜引諸史以證太乙遁甲與今所存書往往不同意古書散逸久矣孟氏賈林杜佑即唐紀燮所集者岐公相業足稱而文章議論亦炳煥傑出其注里居時撰見通典張預承歷代名將用兵制勝有合于孫子者編次為傳于孫子多所發眀梅堯臣注文忠公謂其當與三家並傳晦翁有定論矣孟氏賈林王晢何氏雖言人人殊而皆于觀者有所禆益此注之所以集也夫兵凶器也不得已而用之者也然不素習于承平之時而姑試于有事之日吾不知其可也故生而懸弧長而習射冬而講武凡人之所當知者也詩云文武吉甫萬邦為憲孔子曰有文事者必有武備又曰戚戰則克聖人之所以教者也余夙有四方之志每涉獵群書而尤嗜孫子孫子上謀而後攻修道而保法論將則曰仁智信勇嚴與孔子合至于戰守攻圍之道批抗搗虛之術山林險阻之勢料敵用間之謀靡不畢具其他韜鈐機略孰能過之然其言約而該近而逺未易窺測今觀諸家所注或本隱以之顯或由粗而識精或援史而證之以事或因言而實之以人于是孫子之微詞奧義彰彰眀矣故曰孫子十三篇不惟武人根本攴士亦當盡心焉旨哉言乎豫奉命督軍虔臺進武辨及生儒問之無有知是畫者故授之以梓以廣其傳嘉靖乙卯春正月榖日錫山談愷書于虔臺之思歸軒孫子集注序
